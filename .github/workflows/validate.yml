name: Validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_call: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 0: Discover charts that have Chart.yaml ───────────────────────────
  discover-charts:
    name: Discover Helm Charts
    runs-on: ubuntu-latest
    outputs:
      charts: ${{ steps.list.outputs.charts }}
    steps:
      - uses: actions/checkout@v4
      - name: List charts with Chart.yaml
        id: list
        run: |
          CHARTS=$(
            { ls platform/charts/*/Chart.yaml 2>/dev/null; ls cluster/kind/charts/*/Chart.yaml 2>/dev/null; } \
              | sed 's|/Chart.yaml||' \
              | sort \
              | python3 -c "import sys,json; print(json.dumps(sys.stdin.read().split()))")
          echo "charts=$CHARTS" >> "$GITHUB_OUTPUT"
          echo "Discovered charts: $CHARTS"

  # ── Job 1: Helm chart validation (HA gate) ─────────────────────────────────
  helm-validate:
    name: Helm Validate — ${{ matrix.chart }}
    runs-on: ubuntu-latest
    needs: [discover-charts]
    strategy:
      fail-fast: false
      matrix:
        chart: ${{ fromJson(needs.discover-charts.outputs.charts) }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.29.0

      - name: Cache Helm deps
        uses: actions/cache@v4
        with:
          path: ${{ matrix.chart }}/charts
          key: helm-${{ matrix.chart }}-${{ hashFiles(format('{0}/Chart.lock', matrix.chart)) }}
          restore-keys: helm-${{ matrix.chart }}-

      - name: Helm dependency update
        run: |
          if [ -f "${{ matrix.chart }}/Chart.yaml" ]; then
            helm dependency update "${{ matrix.chart }}/" 2>/dev/null || true
          fi

      - name: Helm lint
        run: |
          helm lint "${{ matrix.chart }}/"

      - name: Set safe chart name for filenames
        run: echo "CHART_SAFE=$(echo '${{ matrix.chart }}' | tr '/' '_')" >> "$GITHUB_ENV"

      - name: Helm template (render)
        id: template
        run: |
          helm template sovereign "${{ matrix.chart }}/" \
            --set global.domain=sovereign-autarky.dev \
            > "/tmp/rendered-${CHART_SAFE}.yaml"
          echo "Rendered $(wc -l < "/tmp/rendered-${CHART_SAFE}.yaml") lines"

      - name: Assert PodDisruptionBudget present
        run: |
          if grep -q "kind: Deployment\|kind: StatefulSet" "/tmp/rendered-${CHART_SAFE}.yaml"; then
            if ! grep -q "kind: PodDisruptionBudget" "/tmp/rendered-${CHART_SAFE}.yaml"; then
              echo "ERROR: ${{ matrix.chart }} has a Deployment/StatefulSet but no PodDisruptionBudget"
              exit 1
            fi
            echo "✓ PodDisruptionBudget found"
          else
            echo "✓ No Deployment/StatefulSet — PodDisruptionBudget not required"
          fi

      - name: Assert podAntiAffinity present
        run: |
          # ha_exception charts are architecturally single-instance — podAntiAffinity not required
          HA_EXCEPTION=$(python3 -c "
          import yaml, sys, os
          chart = os.path.basename('${{ matrix.chart }}')
          try:
              with open('platform/vendor/VENDORS.yaml') as f:
                  data = yaml.safe_load(f)
              for v in data.get('vendors', []):
                  if v.get('name') == chart and v.get('ha_exception') is True:
                      print('true')
                      sys.exit(0)
          except Exception:
              pass
          print('false')
          " 2>/dev/null || echo "false")
          if [ "$HA_EXCEPTION" = "true" ]; then
            echo "INFO: ha_exception=true for ${{ matrix.chart }} — podAntiAffinity check skipped"
            exit 0
          fi
          if grep -q "kind: Deployment\|kind: StatefulSet" "/tmp/rendered-${CHART_SAFE}.yaml"; then
            if ! grep -q "podAntiAffinity" "/tmp/rendered-${CHART_SAFE}.yaml"; then
              echo "ERROR: ${{ matrix.chart }} has a Deployment/StatefulSet but no podAntiAffinity"
              exit 1
            fi
            echo "✓ podAntiAffinity found"
          else
            echo "✓ No Deployment/StatefulSet — podAntiAffinity not required"
          fi

      - name: Assert replicaCount >= 2 in values.yaml
        run: |
          VALUES="${{ matrix.chart }}/values.yaml"
          if [ ! -f "$VALUES" ]; then
            echo "No values.yaml — skipping replicaCount check"
            exit 0
          fi
          # Check for ha_exception in platform/vendor/VENDORS.yaml for this chart
          HA_EXCEPTION=$(python3 -c "
          import yaml, sys, os
          chart = os.path.basename('${{ matrix.chart }}')
          try:
              with open('platform/vendor/VENDORS.yaml') as f:
                  data = yaml.safe_load(f)
              for v in data.get('vendors', []):
                  if v.get('name') == chart and v.get('ha_exception') is True:
                      print('true')
                      sys.exit(0)
          except Exception:
              pass
          print('false')
          " 2>/dev/null || echo "false")
          if [ "$HA_EXCEPTION" = "true" ]; then
            echo "INFO: ha_exception=true for ${{ matrix.chart }} in platform/vendor/VENDORS.yaml — replicaCount check skipped"
            exit 0
          fi
          REPLICA=$(python3 -c "
          import yaml, sys
          with open('$VALUES') as f:
              v = yaml.safe_load(f)
          rc = v.get('replicaCount', None)
          if rc is None:
              print('NONE')
          else:
              print(rc)
          " 2>/dev/null || echo "NONE")

          if [ "$REPLICA" = "NONE" ]; then
            echo "INFO: replicaCount not set in values.yaml (may be inherited from subchart)"
          elif [ "$REPLICA" -lt 2 ] 2>/dev/null; then
            echo "ERROR: ${{ matrix.chart }}/values.yaml has replicaCount=$REPLICA (must be >= 2)"
            exit 1
          else
            echo "✓ replicaCount=$REPLICA"
          fi

      - name: "Assert no :latest image tags in values.yaml"
        run: |
          VALUES="${{ matrix.chart }}/values.yaml"
          if [ ! -f "$VALUES" ]; then exit 0; fi
          if grep -qE ":\s*latest\b|tag:\s*latest\b" "$VALUES"; then
            echo "ERROR: ${{ matrix.chart }}/values.yaml contains :latest image tag"
            grep -nE ":\s*latest\b|tag:\s*latest\b" "$VALUES"
            exit 1
          fi
          echo "✓ No :latest tags found"

      - name: Assert image.repository uses global.imageRegistry
        run: |
          VALUES="${{ matrix.chart }}/values.yaml"
          if [ ! -f "$VALUES" ]; then exit 0; fi
          # Only check if image.repository is explicitly set (not via subchart)
          if python3 -c "
          import yaml, sys
          with open('$VALUES') as f:
              v = yaml.safe_load(f) or {}
          img = v.get('image', {})
          repo = img.get('repository', None)
          if repo and not repo.startswith('{{') and not repo.startswith('harbor') and '/' in repo and not repo.startswith('global'):
              # Has a hardcoded external registry
              parts = repo.split('/')
              if any(x in parts[0] for x in ['docker.io', 'ghcr.io', 'quay.io', 'gcr.io', 'registry.k8s.io']):
                  print('FAIL:' + repo)
                  sys.exit(1)
          " 2>/dev/null; then
            echo "✓ image.repository does not hardcode an external registry"
          fi

  # ── Job 2: Shell script validation ────────────────────────────────────────
  shell-validate:
    name: Shell Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck

      - name: Shellcheck cluster and platform scripts
        run: |
          find cluster platform -name "*.sh" -not -path "*/node_modules/*" -print0 | xargs -0 shellcheck -S error

      - name: Shellcheck prd scripts
        run: |
          find prd -name "*.sh" -print0 | xargs -0 -r shellcheck -S error

      - name: Shellcheck scripts/ralph
        run: |
          find scripts/ralph -name "*.sh" -print0 | xargs -0 shellcheck -S error

      - name: Shellcheck vendor scripts (if any)
        run: |
          if ls platform/vendor/*.sh 2>/dev/null | head -1 | grep -q .; then
            find platform/vendor -name "*.sh" -print0 | xargs -0 shellcheck -S error
          else
            echo "No vendor scripts yet — skipping"
          fi

      - name: Assert vendor scripts handle --dry-run and --backup
        run: |
          FAIL=0
          if ls platform/vendor/*.sh 2>/dev/null | head -1 | grep -q .; then
            for script in platform/vendor/*.sh; do
              if ! grep -qE "dry.run|DRY_RUN" "$script"; then
                echo "ERROR: $script missing --dry-run handling"
                FAIL=1
              fi
              if ! grep -qE "backup|BACKUP" "$script"; then
                echo "ERROR: $script missing --backup handling"
                FAIL=1
              fi
            done
          else
            echo "No vendor scripts yet — skipping"
          fi
          exit $FAIL

  # ── Job 3: Vendor audit (only when vendor/ changes) ───────────────────────
  vendor-audit:
    name: Vendor Audit
    runs-on: ubuntu-latest
    if: >
      contains(github.event.head_commit.modified, 'platform/vendor/') ||
      contains(toJson(github.event.pull_request.changed_files), 'platform/vendor/')

    steps:
      - uses: actions/checkout@v4

      - name: Run vendor/audit.sh
        run: |
          if [ -f platform/vendor/audit.sh ]; then
            bash platform/vendor/audit.sh
          else
            echo "platform/vendor/audit.sh not yet created — skipping"
          fi

      - name: Validate VENDORS.yaml schema
        run: |
          if [ -f platform/vendor/VENDORS.yaml ]; then
            python3 - <<'PYEOF'
          import yaml, sys

          with open('platform/vendor/VENDORS.yaml') as f:
              vendors = yaml.safe_load(f)

          required = ['name', 'upstream', 'version', 'license', 'distroless']
          blocked_licenses = ['BSL', 'SSPL']
          errors = []

          for entry in (vendors.get('vendors') or []):
              name = entry.get('name', '<unknown>')
              for field in required:
                  if field not in entry:
                      errors.append(f"{name}: missing required field '{field}'")
              lic = entry.get('license', '')
              if any(b in lic for b in blocked_licenses):
                  if not entry.get('deprecated'):
                      errors.append(f"{name}: blocked license '{lic}' but not marked deprecated")

          if errors:
              print("VENDORS.yaml validation errors:")
              for e in errors:
                  print(f"  {e}")
              sys.exit(1)
          print(f"✓ VENDORS.yaml: {len(vendors.get('vendors', []))} entries validated")
          PYEOF
          else
            echo "platform/vendor/VENDORS.yaml not yet created — skipping"
          fi

      - name: Validate recipe.yaml rollout and backup sections
        run: |
          python3 - <<'PYEOF'
          import yaml, sys, os

          errors = []
          checked = 0

          for root, dirs, files in os.walk('platform/vendor/recipes'):
              for fname in files:
                  if fname == 'recipe.yaml':
                      path = os.path.join(root, fname)
                      with open(path) as f:
                          recipe = yaml.safe_load(f)
                      checked += 1
                      rollout = recipe.get('rollout', {})
                      backup = recipe.get('backup', {})
                      if not rollout.get('strategy'):
                          errors.append(f"{path}: missing rollout.strategy")
                      if 'max_unavailable' not in rollout:
                          errors.append(f"{path}: missing rollout.max_unavailable")
                      if not backup.get('priority'):
                          errors.append(f"{path}: missing backup.priority")

          if errors:
              print("recipe.yaml validation errors:")
              for e in errors:
                  print(f"  {e}")
              sys.exit(1)
          if checked == 0:
              print("No recipe.yaml files found yet — skipping")
          else:
              print(f"✓ {checked} recipe.yaml files validated")
          PYEOF

  # ── Job 4: ArgoCD application validation ─────────────────────────────────
  argocd-validate:
    name: ArgoCD Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: "Assert revisionHistoryLimit: 3 on all Applications"
        run: |
          python3 - <<'PYEOF'
          import yaml, sys, os

          errors = []
          checked = 0

          for root, dirs, files in os.walk('argocd-apps'):
              for fname in files:
                  if not fname.endswith('.yaml') and not fname.endswith('.yml'):
                      continue
                  path = os.path.join(root, fname)
                  with open(path) as f:
                      docs = list(yaml.safe_load_all(f))
                  for doc in docs:
                      if not doc:
                          continue
                      if doc.get('kind') == 'Application':
                          checked += 1
                          rhl = doc.get('spec', {}).get('revisionHistoryLimit')
                          if rhl != 3:
                              errors.append(f"{path}: revisionHistoryLimit is {rhl!r} (must be 3)")

          if errors:
              print("ArgoCD Application validation errors:")
              for e in errors:
                  print(f"  {e}")
              sys.exit(1)
          if checked == 0:
              print("No ArgoCD Application manifests found — skipping")
          else:
              print(f"✓ {checked} Application manifests validated (revisionHistoryLimit=3)")
          PYEOF

  # ── Job 5: Bootstrap script validation ───────────────────────────────────
  bootstrap-validate:
    name: Bootstrap Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck

      - name: Shellcheck cluster/kind/bootstrap.sh
        run: |
          shellcheck -S error cluster/kind/bootstrap.sh

      - name: Assert --dry-run flag in cluster/kind/bootstrap.sh
        run: |
          if ! grep -qE "dry.run|DRY_RUN" cluster/kind/bootstrap.sh; then
            echo "ERROR: cluster/kind/bootstrap.sh is missing --dry-run flag support"
            exit 1
          fi
          echo "✓ --dry-run flag found in cluster/kind/bootstrap.sh"

      - name: Shellcheck platform/deploy.sh
        run: |
          shellcheck -S error platform/deploy.sh

      - name: Assert no hardcoded IP addresses in cluster scripts
        run: |
          FAIL=0
          for script in cluster/kind/bootstrap.sh platform/deploy.sh; do
            if grep -qE 'IP="[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}"' "$script"; then
              echo "ERROR: $script contains a hardcoded IP address"
              FAIL=1
            fi
          done
          [ $FAIL -eq 0 ] && echo "✓ No hardcoded IP addresses in cluster scripts"
          exit $FAIL

  # ── Job 6: README chart path validation ──────────────────────────────────
  readme-validate:
    name: README Chart Path Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Assert chart paths in README exist in repo
        run: |
          python3 - <<'PYEOF'
          import re, sys, os

          with open('README.md') as f:
              content = f.read()

          # Match helm install/upgrade/lint/template calls that reference a local chart path
          # Local paths: start with platform/ cluster/ or ./ and end after the path token
          pattern = re.compile(r'helm\s+\S+\s+\S+\s+((?:platform|cluster|\.)/\S+?)(?:/\s|\s|$)', re.MULTILINE)

          errors = []
          checked = 0
          for m in pattern.finditer(content):
              path = m.group(1).rstrip('/')
              checked += 1
              if not os.path.isdir(path):
                  errors.append(f"  x README references chart path '{path}' — directory does not exist")

          if errors:
              print("README CHART PATH VIOLATION: paths referenced in README do not exist:")
              for e in errors:
                  print(e)
              sys.exit(1)
          print(f"✓ README chart paths validated ({checked} checked)")
          PYEOF
