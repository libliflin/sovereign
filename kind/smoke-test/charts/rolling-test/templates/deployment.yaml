apiVersion: apps/v1
kind: Deployment
metadata:
  name: rolling-test
  namespace: rolling-test
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: rolling-test
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: rolling-test
      annotations:
        rolling-test/version: {{ .Values.rollAnnotation | quote }}
    spec:
      containers:
        - name: pause
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
