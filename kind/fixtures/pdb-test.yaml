---
apiVersion: v1
kind: Namespace
metadata:
  name: pdb-test
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pdb-test
  namespace: pdb-test
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pdb-test
  template:
    metadata:
      labels:
        app: pdb-test
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: pdb-test
              topologyKey: kubernetes.io/hostname
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.9
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: pdb-test
  namespace: pdb-test
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: pdb-test
