{{- if .Values.selfSigned.enabled }}
---
# Bootstrap ClusterIssuer: self-signed root CA
# Used to issue certificates before Vault PKI is available (Phase 1)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-issuer
  labels:
    {{- include "cert-manager.labels" . | nindent 4 }}
  annotations:
    # Deploy after cert-manager CRDs are established
    argocd.argoproj.io/sync-wave: "1"
spec:
  selfSigned: {}
---
# Self-signed CA Certificate
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: sovereign-ca
  namespace: cert-manager
  labels:
    {{- include "cert-manager.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  isCA: true
  commonName: sovereign-ca
  secretName: sovereign-ca-secret
  duration: 87600h  # 10 years
  renewBefore: 720h # 30 days before expiry
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
    group: cert-manager.io
---
# CA-backed ClusterIssuer — use this for all platform certificates
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: sovereign-ca-issuer
  labels:
    {{- include "cert-manager.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  ca:
    secretName: sovereign-ca-secret
{{- end }}
