apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-dashboard-ceph
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "prometheus-stack.labels" . | nindent 4 }}
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Sovereign Platform"
data:
  ceph-cluster.json: |-
    {
      "id": null,
      "uid": "sovereign-ceph",
      "title": "Ceph Cluster Overview",
      "description": "Rook/Ceph storage: OSD health, throughput, latency, capacity",
      "tags": ["sovereign", "ceph", "storage"],
      "timezone": "browser",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "60s",
      "panels": [],
      "__inputs": [],
      "__requires": [
        {
          "type": "datasource",
          "id": "prometheus",
          "name": "Prometheus",
          "version": "1.0.0"
        }
      ]
    }
