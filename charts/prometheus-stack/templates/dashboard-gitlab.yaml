apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-dashboard-gitlab
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "prometheus-stack.labels" . | nindent 4 }}
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Sovereign Platform"
data:
  gitlab-overview.json: |-
    {
      "id": null,
      "uid": "sovereign-gitlab",
      "title": "GitLab Overview",
      "description": "GitLab service health: pipelines, runner queue, web latency",
      "tags": ["sovereign", "gitlab", "cicd"],
      "timezone": "browser",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "60s",
      "panels": [],
      "__inputs": [],
      "__requires": [
        {
          "type": "datasource",
          "id": "prometheus",
          "name": "Prometheus",
          "version": "1.0.0"
        }
      ]
    }
