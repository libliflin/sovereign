apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-dashboard-kubernetes
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "prometheus-stack.labels" . | nindent 4 }}
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Sovereign Platform"
data:
  kubernetes-cluster.json: |-
    {
      "id": null,
      "uid": "sovereign-kubernetes",
      "title": "Kubernetes Cluster Overview",
      "description": "Kubernetes cluster health: nodes, pods, resource usage (Grafana dashboard 7249)",
      "tags": ["sovereign", "kubernetes", "cluster"],
      "timezone": "browser",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "panels": [],
      "__inputs": [],
      "__requires": [
        {
          "type": "datasource",
          "id": "prometheus",
          "name": "Prometheus",
          "version": "1.0.0"
        }
      ]
    }
