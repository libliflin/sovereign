{{/*
Admin password SealedSecret placeholder.
In production, generate and seal the admin password:
  1. Generate bcrypt hash:
       htpasswd -nbBC 10 "" <your-password> | tr -d ':\n' | sed 's/$2y/$2a/'
  2. Create a secret:
       kubectl create secret generic argocd-secret \
         --from-literal=admin.password=<bcrypt-hash> \
         --from-literal=admin.passwordMtime=$(date +%FT%T%Z) \
         -n argocd --dry-run=client -o yaml > argocd-admin-secret.yaml
  3. Seal it:
       kubeseal --format yaml < argocd-admin-secret.yaml > argocd-admin-sealedsecret.yaml
  4. Add the SealedSecret to this chart's templates/ directory.

This file is intentionally empty — the argo-cd subchart manages the argocd-secret.
Override argocdServerAdminPassword in values.yaml or use a SealedSecret.
*/}}
