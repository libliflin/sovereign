apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "sovereign-pm.fullname" . }}
  namespace: sovereign-pm
  labels:
    app.kubernetes.io/name: sovereign-pm
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "sovereign-pm.fullname" . }}-job-creator
  namespace: sovereign-pm
  labels:
    app.kubernetes.io/name: sovereign-pm
    app.kubernetes.io/instance: {{ .Release.Name }}
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "sovereign-pm.fullname" . }}-job-creator
  namespace: sovereign-pm
  labels:
    app.kubernetes.io/name: sovereign-pm
    app.kubernetes.io/instance: {{ .Release.Name }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "sovereign-pm.fullname" . }}-job-creator
subjects:
  - kind: ServiceAccount
    name: {{ include "sovereign-pm.fullname" . }}
    namespace: sovereign-pm
