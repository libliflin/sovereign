{{- if .Values.grafanaDashboard.enabled }}
---
# Ceph Cluster Overview Grafana Dashboard
# ConfigMap is picked up by Grafana's sidecar dashboard loader
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "rook-ceph.fullname" . }}-grafana-dashboard
  namespace: {{ .Values.grafanaDashboard.namespace }}
  labels:
    {{- include "rook-ceph.labels" . | nindent 4 }}
    {{ .Values.grafanaDashboard.label.key }}: {{ .Values.grafanaDashboard.label.value | quote }}
data:
  ceph-cluster-overview.json: |
    {
      "__inputs": [],
      "__requires": [
        { "type": "grafana", "id": "grafana", "name": "Grafana", "version": "8.0.0" },
        { "type": "datasource", "id": "prometheus", "name": "Prometheus", "version": "1.0.0" }
      ],
      "annotations": { "list": [] },
      "description": "Ceph Cluster Overview — OSDs, pools, throughput, latency",
      "editable": true,
      "gnetId": 2842,
      "graphTooltip": 1,
      "id": null,
      "iteration": 1620000000000,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 1,
          "title": "Cluster Health",
          "type": "row"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "green", "value": 2 }
                ]
              }
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 1 },
          "id": 2,
          "options": { "orientation": "auto", "reduceOptions": { "calcs": ["lastNotNull"] }, "showThresholdLabels": false, "showThresholdMarkers": true },
          "title": "Ceph Health",
          "type": "gauge",
          "targets": [
            {
              "expr": "ceph_health_status",
              "legendFormat": "Health",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": { "defaults": { "unit": "bytes" } },
          "gridPos": { "h": 4, "w": 4, "x": 4, "y": 1 },
          "id": 3,
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] } },
          "title": "Total Capacity",
          "type": "stat",
          "targets": [
            {
              "expr": "ceph_cluster_total_bytes",
              "legendFormat": "Total",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": { "defaults": { "unit": "bytes" } },
          "gridPos": { "h": 4, "w": 4, "x": 8, "y": 1 },
          "id": 4,
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] } },
          "title": "Used Capacity",
          "type": "stat",
          "targets": [
            {
              "expr": "ceph_cluster_total_used_bytes",
              "legendFormat": "Used",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": { "defaults": { "unit": "short" } },
          "gridPos": { "h": 4, "w": 4, "x": 12, "y": 1 },
          "id": 5,
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] } },
          "title": "OSD Count",
          "type": "stat",
          "targets": [
            {
              "expr": "count(ceph_osd_up)",
              "legendFormat": "OSDs Up",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": { "defaults": { "unit": "Bps" } },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 5 },
          "id": 6,
          "title": "Cluster Throughput",
          "type": "graph",
          "targets": [
            {
              "expr": "sum(irate(ceph_osd_op_r_out_bytes[5m]))",
              "legendFormat": "Read",
              "refId": "A"
            },
            {
              "expr": "sum(irate(ceph_osd_op_w_in_bytes[5m]))",
              "legendFormat": "Write",
              "refId": "B"
            }
          ]
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": { "defaults": { "unit": "ms" } },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 5 },
          "id": 7,
          "title": "OSD Latency",
          "type": "graph",
          "targets": [
            {
              "expr": "avg(ceph_osd_apply_latency_ms)",
              "legendFormat": "Apply",
              "refId": "A"
            },
            {
              "expr": "avg(ceph_osd_commit_latency_ms)",
              "legendFormat": "Commit",
              "refId": "B"
            }
          ]
        }
      ],
      "refresh": "30s",
      "schemaVersion": 30,
      "style": "dark",
      "tags": ["ceph", "storage"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "Ceph Cluster Overview",
      "uid": "ceph-cluster-overview",
      "version": 1
    }
{{- end }}
