{{- if .Values.verificationJob.enabled }}
---
# Post-install Job — verifies Ceph OSDs are up and cluster is healthy
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "rook-ceph.fullname" . }}-verify-osds
  namespace: rook-ceph
  labels:
    {{- include "rook-ceph.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "2"
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rook-ceph-verify
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      restartPolicy: OnFailure
      serviceAccountName: rook-ceph-osd
      containers:
        - name: verify-osds
          image: {{ .Values.verificationJob.image }}
          command:
            - /bin/bash
            - -c
            - |
              set -e

              echo "=== Waiting for Ceph toolbox to be available ==="
              # Wait up to 10 minutes for OSDs to come online
              TIMEOUT=600
              ELAPSED=0
              while true; do
                STATUS=$(ceph health --connect-timeout 5 2>/dev/null || echo "UNREACHABLE")
                if [ "$STATUS" != "UNREACHABLE" ]; then
                  break
                fi
                if [ "$ELAPSED" -ge "$TIMEOUT" ]; then
                  echo "ERROR: Ceph cluster did not become reachable in ${TIMEOUT}s"
                  exit 1
                fi
                echo "Waiting for Ceph... (${ELAPSED}s elapsed)"
                sleep 10
                ELAPSED=$((ELAPSED + 10))
              done

              echo "=== Ceph Health Status ==="
              ceph health detail

              echo "=== OSD Tree ==="
              ceph osd tree

              echo "=== OSD Status ==="
              ceph osd stat

              OSD_UP=$(ceph osd stat | grep -oE '[0-9]+ osds' | grep -oE '[0-9]+' | head -1 || echo "0")
              OSD_IN=$(ceph osd stat | grep -oE '[0-9]+ in' | grep -oE '[0-9]+' | head -1 || echo "0")

              echo "OSDs up: ${OSD_UP}, OSDs in: ${OSD_IN}"

              if [ "${OSD_UP}" -lt 1 ] || [ "${OSD_IN}" -lt 1 ]; then
                echo "ERROR: No OSDs are up and in — cluster is not healthy"
                exit 1
              fi

              HEALTH=$(ceph health --format json | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
              echo "Cluster health: ${HEALTH}"

              if [ "${HEALTH}" = "HEALTH_ERR" ]; then
                echo "ERROR: Cluster health is HEALTH_ERR"
                ceph health detail
                exit 1
              fi

              echo "=== Storage Pools ==="
              ceph osd pool ls detail

              echo "=== Verification PASSED — Ceph cluster is operational ==="
          env:
            - name: CEPH_ARGS
              value: "--conf /etc/ceph/ceph.conf --keyring /etc/ceph/keyring"
          volumeMounts:
            - name: ceph-config
              mountPath: /etc/ceph
              readOnly: true
      volumes:
        - name: ceph-config
          secret:
            secretName: rook-ceph-admin-secret
            optional: true
{{- end }}
