global:
  domain: "sovereign-autarky.dev"
  storageClass: "ceph-block"

# ─── Rook Operator (alias: operator) ─────────────────────────────────────────
# Full values ref: https://rook.io/docs/rook/v1.13/Helm-Charts/operator-chart.md
operator:
  # Resource limits for the operator pod
  resources:
    limits:
      cpu: "500m"
      memory: "512Mi"
    requests:
      cpu: "100m"
      memory: "128Mi"

# ─── Rook Ceph Cluster (alias: cluster) ──────────────────────────────────────
# Full values ref: https://rook.io/docs/rook/v1.13/Helm-Charts/ceph-cluster-chart.md
cluster:
  # Enable the Ceph toolbox pod (useful for debugging: kubectl exec -it -n rook-ceph deploy/rook-ceph-tools -- bash)
  toolbox:
    enabled: true

  cephClusterSpec:
    # Ceph version to deploy
    cephVersion:
      image: quay.io/ceph/ceph:v18.2.0
      allowUnsupported: false

    # Mon quorum — 3 monitors for production HA
    mon:
      count: 3
      allowMultiplePerNode: false

    # Ceph manager
    mgr:
      count: 1
      modules:
        - name: pg_autoscaler
          enabled: true

    # Dashboard — built-in Ceph UI (accessible via port-forward; not exposed via ingress)
    dashboard:
      enabled: true

    # Storage — use all available nodes and devices
    # encryptedDevice enables per-OSD at-rest encryption using dm-crypt/LUKS
    # This uses a cluster-local key by default; see vault section below for Vault KMS
    storage:
      useAllNodes: true
      useAllDevices: true
      config:
        encryptedDevice: "true"   # Encryption at rest: ENABLED by default (cluster-local key)
        # osdsPerDevice: "1"       # uncomment to create multiple OSDs per device
        # databaseSizeMB: "1024"   # uncomment for drives < 100 GB

  # ─── Storage Classes ───────────────────────────────────────────────────────
  # Block pool — ReadWriteOnce (databases, stateful sets)
  cephBlockPools:
    - name: ceph-blockpool
      spec:
        failureDomain: host
        replicated:
          size: 3
      storageClass:
        enabled: true
        name: ceph-block
        isDefault: true
        reclaimPolicy: Delete
        allowVolumeExpansion: true
        volumeBindingMode: "Immediate"
        parameters:
          # Per-volume encryption via storage class (maps to encryptedDevice in cluster config)
          encrypted: "true"

  # Shared filesystem — ReadWriteMany (code-server workspaces, shared assets)
  cephFileSystems:
    - name: ceph-filesystem
      spec:
        metadataPool:
          replicated:
            size: 3
        dataPools:
          - failureDomain: host
            replicated:
              size: 3
            name: data0
        metadataServer:
          activeCount: 1
          activeStandby: true
      storageClass:
        enabled: true
        isDefault: false
        name: ceph-filesystem
        reclaimPolicy: Delete
        allowVolumeExpansion: true
        volumeBindingMode: "Immediate"
        parameters:
          csi.storage.k8s.io/provisioner-secret-name: rook-csi-cephfs-provisioner
          csi.storage.k8s.io/provisioner-secret-namespace: rook-ceph
          csi.storage.k8s.io/controller-expand-secret-name: rook-csi-cephfs-provisioner
          csi.storage.k8s.io/controller-expand-secret-namespace: rook-ceph
          csi.storage.k8s.io/node-stage-secret-name: rook-csi-cephfs-node
          csi.storage.k8s.io/node-stage-secret-namespace: rook-ceph

  # Object store — S3-compatible bucket claims (GitLab artifacts, Harbor, Loki, Thanos, Tempo)
  cephObjectStores:
    - name: ceph-objectstore
      spec:
        metadataPool:
          failureDomain: host
          replicated:
            size: 3
        dataPool:
          failureDomain: host
          erasureCoded:
            dataChunks: 2
            codingChunks: 1
        preservePoolsOnDelete: true
        gateway:
          port: 80
          instances: 1
      storageClass:
        enabled: true
        name: ceph-bucket
        reclaimPolicy: Delete
        volumeBindingMode: "Immediate"
      ingress:
        enabled: false   # expose via ClusterIP only; external access via Ceph RGW if needed

# ─── Vault KMS Integration (disabled by default) ─────────────────────────────
# Enable after Vault is running with the Transit secrets engine configured.
# When enabled, Vault provides per-OSD encryption keys instead of the cluster-local key.
#
# Setup steps (one-time, after Vault is running):
#   1. vault secrets enable transit
#   2. vault write -f transit/keys/rook-ceph-osd-master-key
#   3. Create a Vault policy granting rook-ceph access to the transit key
#   4. Create a sealed secret: kubectl create secret -n rook-ceph rook-ceph-vault-token \
#        --from-literal=token=<vault-token> | kubeseal ...
#
# Then set:
#   vault.enabled: true
#   vault.address: "https://vault.your-domain.com"
vault:
  enabled: false
  # Vault server address (must be reachable from the rook-ceph namespace)
  address: ""
  # Transit engine path (must have encrypt/decrypt capabilities for rook-ceph)
  backend: "transit"
  # Name of the Sealed Secret containing the Vault token
  tokenSecretName: "rook-ceph-vault-token"

# ─── Grafana Dashboard ────────────────────────────────────────────────────────
grafanaDashboard:
  enabled: true
  namespace: monitoring   # namespace where Grafana's sidecar looks for ConfigMaps
  label:
    key: grafana_dashboard
    value: "1"

# ─── Verification Job ─────────────────────────────────────────────────────────
verificationJob:
  enabled: true
  image: quay.io/ceph/ceph:v18.2.0
