global:
  domain: "sovereign-autarky.dev"
  storageClass: "ceph-block"
  keycloak:
    url: "https://auth.sovereign-autarky.dev"
    realm: "sovereign"

# ---------------------------------------------------------------------------
# Vault operational mode
# ---------------------------------------------------------------------------
# dev: true  — single pod, in-memory storage, auto-unsealed. Use for bootstrap.
# dev: false — production HA mode. Requires a real storage backend (see ha section).
dev:
  enabled: true

# ---------------------------------------------------------------------------
# Ingress for Vault UI (custom — upstream ingress disabled)
# ---------------------------------------------------------------------------
ingress:
  enabled: true
  # Hostname is always vault.{{ .Values.global.domain }} — set via _helpers.tpl
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: sovereign-ca-issuer
  tls: true

# ---------------------------------------------------------------------------
# Jobs
# ---------------------------------------------------------------------------
jobs:
  # PKI secrets engine initialisation (runs once after Vault is Ready)
  pkiInit:
    enabled: true
    ttl: "87600h"   # 10-year root CA
    intermediateTtl: "43800h"  # 5-year intermediate

  # Kubernetes auth method setup (runs once after pkiInit)
  k8sAuth:
    enabled: true
    # Role that platform services use to authenticate with Vault
    roleName: "sovereign-platform"
    # Namespace selector — all namespaces by default
    boundNamespaces: "*"

# ---------------------------------------------------------------------------
# Auto-unseal stub (disabled by default — requires a running KMS)
# ---------------------------------------------------------------------------
autoUnseal:
  enabled: false
  # provider: awskms | gcpckms | azurekeyvault | transit
  provider: awskms
  awskms:
    region: "us-east-1"
    kmsKeyId: ""   # fill in your KMS key ARN
  # For transit auto-unseal (another Vault instance as the unseal service):
  transit:
    address: ""
    token: ""
    keyName: ""

