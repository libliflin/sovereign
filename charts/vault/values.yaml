# ---------------------------------------------------------------------------
# Upstream vault subchart values
# ---------------------------------------------------------------------------
vault:
  global:
    enabled: true

  server:
    # Dev mode: single pod, in-memory, root token = root
    dev:
      enabled: true   # controlled by .Values.dev.enabled — overridden in templates

    # Disable the upstream chart's own ingress (we manage it separately)
    ingress:
      enabled: false

    # Resource limits
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "512Mi"
        cpu: "500m"

    # Readiness probe
    readinessProbe:
      enabled: true
      path: "/v1/sys/health?standbyok=true"

    # Liveness probe
    livenessProbe:
      enabled: true
      path: "/v1/sys/health?standbyok=true"
      initialDelaySeconds: 60

    # Service account for Kubernetes auth
    serviceAccount:
      create: true
      name: "vault"

  # Vault UI
  ui:
    enabled: true
    serviceType: ClusterIP

  # Injector (Agent sidecar injector)
  injector:
    enabled: true
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "128Mi"
        cpu: "100m"
