{{- if .Values.jobs.k8sAuth.enabled }}
---
# Kubernetes auth method setup Job.
# Runs after pki-init. Enables the Kubernetes auth method and creates a policy
# and role that platform services can use to authenticate with Vault.
#
# Services authenticate by presenting their pod ServiceAccount JWT.
# The policy allows reading PKI certs and secrets under secret/sovereign/*.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-vault-k8s-auth
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vault.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
    # Run after pki-init (wave 1)
    argocd.argoproj.io/sync-wave: "1"
spec:
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        {{- include "vault.labels" . | nindent 8 }}
        app.kubernetes.io/component: k8s-auth
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ .Release.Name }}-vault
      initContainers:
        - name: wait-for-pki
          image: curlimages/curl:8.5.0
          command:
            - sh
            - -c
            - |
              echo "Waiting for Vault PKI to be ready..."
              until curl -sf {{ include "vault.address" . }}/v1/pki_int/ca; do
                sleep 5
              done
              echo "Vault PKI is ready."
      containers:
        - name: k8s-auth
          image: hashicorp/vault:1.15.0
          env:
            - name: VAULT_ADDR
              value: {{ include "vault.address" . | quote }}
            - name: VAULT_TOKEN
              value: "root"
          command:
            - sh
            - -ec
            - |
              ROLE="{{ .Values.jobs.k8sAuth.roleName }}"
              NAMESPACES="{{ .Values.jobs.k8sAuth.boundNamespaces }}"

              echo "=== Enabling Kubernetes auth method ==="
              vault auth enable kubernetes 2>/dev/null || echo "kubernetes auth already enabled"

              echo "=== Configuring Kubernetes auth ==="
              vault write auth/kubernetes/config \
                kubernetes_host="https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT}" \
                kubernetes_ca_cert="$(cat /var/run/secrets/kubernetes.io/serviceaccount/ca.crt)" \
                token_reviewer_jwt="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)"

              echo "=== Creating sovereign-platform policy ==="
              vault policy write sovereign-platform - <<'POLICY'
              # Allow reading PKI certificates
              path "pki_int/issue/sovereign" {
                capabilities = ["create", "update"]
              }
              path "pki_int/cert/*" {
                capabilities = ["read"]
              }
              # Allow reading platform secrets
              path "secret/data/sovereign/*" {
                capabilities = ["read"]
              }
              path "secret/metadata/sovereign/*" {
                capabilities = ["list", "read"]
              }
              POLICY

              echo "=== Enabling KV secrets engine ==="
              vault secrets enable -path=secret kv-v2 2>/dev/null || echo "secret kv-v2 already enabled"

              echo "=== Creating Kubernetes auth role ==="
              if [ "${NAMESPACES}" = "*" ]; then
                # Bind to all service accounts in all namespaces
                vault write auth/kubernetes/role/"${ROLE}" \
                  bound_service_account_names="*" \
                  bound_service_account_namespaces="*" \
                  policies="sovereign-platform" \
                  ttl="1h"
              else
                vault write auth/kubernetes/role/"${ROLE}" \
                  bound_service_account_names="*" \
                  bound_service_account_namespaces="${NAMESPACES}" \
                  policies="sovereign-platform" \
                  ttl="1h"
              fi

              echo "=== Kubernetes auth setup complete ==="
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
{{- end }}
