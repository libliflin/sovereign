global:
  domain: "sovereign-autarky.dev"
  storageClass: "ceph-block"
  imageRegistry: ""  # set to harbor.<domain>/sovereign after Harbor is running
  keycloak:
    url: "https://auth.sovereign-autarky.dev"
    realm: "sovereign"

replicaCount: 2

image:
  repository: "ghcr.io/backstage/backstage"
  name: "backstage/backstage"
  tag: "latest"
  pullPolicy: IfNotPresent

keycloak:
  url: "https://auth.sovereign-autarky.dev"
  realm: "sovereign"
  clientId: "backstage"

service:
  type: ClusterIP
  port: 7007

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  tls: true

podDisruptionBudget:
  minAvailable: 1

readinessProbe:
  httpGet:
    path: /healthcheck
    port: 7007
  initialDelaySeconds: 15
  periodSeconds: 10

livenessProbe:
  httpGet:
    path: /healthcheck
    port: 7007
  initialDelaySeconds: 30
  periodSeconds: 30

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

backstage:
  appConfig:
    catalog:
      providers:
        gitlab:
          host: "gitlab.sovereign-autarky.dev"
          apiBaseUrl: "https://gitlab.sovereign-autarky.dev/api/v4"
          branch: "main"
          fallbackBranch: "master"
          skipForkedRepos: false
          entityFilename: "catalog-info.yaml"
          projectPattern: '[\s\S]*'
    kubernetes:
      serviceLocatorMethod:
        type: "multiTenant"
      clusterLocatorMethods:
        - type: "config"
          clusters:
            - url: "https://kubernetes.default.svc"
              name: "sovereign"
              authProvider: "serviceAccount"
              skipTLSVerify: false
              skipMetricsLookup: false
    argocd:
      username: "admin"
      password: ""
      appLocatorMethods:
        - type: "config"
          instances:
            - name: "sovereign"
              url: "https://argocd.sovereign-autarky.dev"
    techdocs:
      builder: "external"
      generator:
        runIn: "docker"
      publisher:
        type: "awsS3"
        awsS3:
          bucketName: "techdocs"
          region: "us-east-1"
          endpoint: "https://s3.sovereign-autarky.dev"
          s3ForcePathStyle: true
