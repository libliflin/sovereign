---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "reportportal.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "reportportal.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  ports:
    - port: 8585
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "reportportal.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "reportportal.fullname" . }}-ui
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "reportportal.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "reportportal.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: ui
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "reportportal.fullname" . }}-index
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "reportportal.labels" . | nindent 4 }}
    app.kubernetes.io/component: index
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "reportportal.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: index
