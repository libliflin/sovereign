---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "reportportal.fullname" . }}-ui
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "reportportal.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "reportportal.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ui
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        {{- include "reportportal.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: ui
    spec:
      affinity:
        {{- include "reportportal.podAntiAffinity" . | nindent 8 }}
      containers:
        - name: ui
          image: {{ include "reportportal.serviceImage" (dict "root" . "svc" .Values.images.ui) }}
          imagePullPolicy: {{ .Values.images.ui.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /ui/
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /ui/
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources.ui | nindent 12 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "reportportal.fullname" . }}-index
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "reportportal.labels" . | nindent 4 }}
    app.kubernetes.io/component: index
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "reportportal.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: index
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        {{- include "reportportal.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: index
    spec:
      affinity:
        {{- include "reportportal.podAntiAffinity" . | nindent 8 }}
      containers:
        - name: index
          image: {{ include "reportportal.serviceImage" (dict "root" . "svc" .Values.images.index) }}
          imagePullPolicy: {{ .Values.images.index.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: RP_SERVER_PORT
              value: "8080"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources.index | nindent 12 }}
