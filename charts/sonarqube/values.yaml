global:
  domain: "sovereign-autarky.dev"
  storageClass: "ceph-block"
  imageRegistry: ""  # set to harbor.<domain>/sovereign after Harbor is running
  keycloak:
    url: "https://auth.sovereign-autarky.dev"
    realm: "sovereign"

# ---------------------------------------------------------------------------
# Custom ingress (upstream ingress disabled — we manage it here)
# ---------------------------------------------------------------------------
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: sovereign-ca-issuer
    nginx.ingress.kubernetes.io/proxy-body-size: "64m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
  tls: true

# ---------------------------------------------------------------------------
# PodDisruptionBudget (managed here — upstream PDB disabled)
# ---------------------------------------------------------------------------
podDisruptionBudget:
  minAvailable: 1

# ---------------------------------------------------------------------------
# Upstream sonarqube subchart values
# ---------------------------------------------------------------------------
sonarqube:
  # SonarQube Community Edition supports only 1 replica.
  # HA clustering requires the Data Center Edition.
  replicaCount: 1

  # Disable upstream ingress — we create our own above
  ingress:
    enabled: false

  # Disable upstream PDB — we create our own above
  podDisruptionBudget:
    enabled: false

  # Storage on ceph-block
  persistence:
    enabled: true
    storageClass: "ceph-block"
    size: "10Gi"
    accessMode: ReadWriteOnce

  # PostgreSQL (embedded, can be replaced with Crossplane external DB)
  postgresql:
    enabled: true
    persistence:
      storageClass: "ceph-block"
      size: "5Gi"

  # Keycloak OIDC authentication via sonar.properties
  # Uses Generic OIDC plugin (pre-installed in SonarQube 9+)
  sonarProperties:
    sonar.auth.oidc.enabled: "true"
    sonar.auth.oidc.clientId.secured: "sovereign-sonarqube"
    sonar.auth.oidc.issuerUri: "https://auth.sovereign-autarky.dev/realms/sovereign"
    sonar.auth.oidc.userInfoEndpointDecoding: "JSON"
    sonar.auth.oidc.loginStrategy: "Email"
    sonar.core.serverBaseURL: "https://sonar.sovereign-autarky.dev"

  # Pod anti-affinity: spread replicas across nodes
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - sonarqube
            topologyKey: kubernetes.io/hostname

  # Resource limits
  resources:
    requests:
      cpu: "500m"
      memory: "2Gi"
    limits:
      cpu: "2000m"
      memory: "4Gi"

  readinessProbe:
    initialDelaySeconds: 60
    periodSeconds: 30
    failureThreshold: 6

  livenessProbe:
    initialDelaySeconds: 60
    periodSeconds: 30
    failureThreshold: 6
