apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keycloak
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: sovereign-platform
  annotations:
    # Deploy after Vault (wave -80), before services that need SSO
    argocd.argoproj.io/sync-wave: "-75"
    argocd-image-updater.argoproj.io/image-list: "app=harbor.sovereign-autarky.dev/sovereign/keycloak"
    argocd-image-updater.argoproj.io/app.update-strategy: semver
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/git-branch: main
spec:
  revisionHistoryLimit: 3
  project: default
  source:
    repoURL: https://github.com/libliflin/sovereign
    targetRevision: HEAD
    path: platform/charts/keycloak
    helm:
      valueFiles:
        - values.yaml
      parameters:
        - name: global.domain
          value: sovereign-autarky.dev
  destination:
    server: https://kubernetes.default.svc
    namespace: keycloak
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
