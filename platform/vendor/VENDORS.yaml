# Sovereign Platform — Vendor Manifest
# Schema per entry:
#   name:                  string  — package identifier (matches vendor/recipes/<name>/)
#   upstream_url:          string  — canonical upstream source URL
#   license_spdx:          string  — SPDX license identifier
#   license_allows_vendor: bool    — false for BSL/SSPL/AGPL (blocked)
#   version_pinned:        string  — pinned release version
#   fetch_method:          enum    — git_tag | tarball | git_commit
#   distroless_compatible: enum    — yes | partial | no
#   distroless_base:       string  — gcr.io/distroless/static | java21 | nodejs | none
#   deprecated:            bool    — true if this entry should not be used as-is
#   deprecated_reason:     string  — why it is deprecated (BSL violation, runtime concerns)
#   alternative:           string  — replacement package name when deprecated: true

