    deprecated: false
    deprecated_reason: ""
    alternative: ""
    ha_exception: true
    ha_exception_reason: "Forgejo requires a ReadWriteMany storage class for multi-replica deploys (git repository data). The current chart uses ReadWriteOnce local-path PVC. A second replica would fail to mount the same volume. Single-instance is correct until the Ceph RWX storage tier is stable and the chart is switched to ceph-filesystem."

