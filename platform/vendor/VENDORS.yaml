    upstream_url: https://github.com/cilium/cilium
    license_spdx: Apache-2.0
    license_allows_vendor: true
    version_pinned: "v1.16.0"
    fetch_method: git_tag
    distroless_compatible: yes
    distroless_base: gcr.io/distroless/static
    ha_compatible: yes
    ha_notes: "stateless control plane pods; scale replicas, add PDB — deferred"
    deprecated: false
    deprecated_reason: ""
    alternative: ""
    limits_exception: true
    limits_exception_reason: "cilium 1.16.0: the 'config' init container template (cilium-agent/daemonset.yaml) does not expose a resource limits value. All other containers (mount-cgroup, install-cni-binaries, cilium-envoy, hubble-relay, hubble-ui) have limits set via values.yaml. Upgrade to a cilium release that supports config init container resource limits when available."

