name: cilium
upstream_url: https://github.com/cilium/cilium
version: "v1.16.0"
license_spdx: Apache-2.0
fetch_method: git_tag
distroless_base: gcr.io/distroless/static
build_tool: ko
rollout:
  strategy: node_by_node
  max_unavailable: 0
  max_surge: 1
  staging_timeout: 5m
  production_timeout: 10m
backup:
  priority: derived
