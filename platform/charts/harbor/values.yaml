## Sovereign Platform — Harbor wrapper chart values
## All hostnames are derived from global.domain — never hardcode.

global:
  domain: "sovereign-autarky.dev"
  storageClass: "local-path"
  imageRegistry: ""  # set to harbor.<domain>/sovereign after Harbor is running
  keycloak:
    url: "https://auth.sovereign-autarky.dev"
    realm: "sovereign"

## ── Harbor subchart values (alias: harbor) ──────────────────────────────────
## https://github.com/goharbor/harbor-helm
harbor:
  ## ── Expose — ClusterIP: sovereign wrapper manages the Ingress ───────────
  ## We disable the upstream chart's ingress and create our own (templates/ingress.yaml)
  ## so the hostname is always derived from {{ .Values.global.domain }}.
  expose:
    type: clusterIP
    tls:
      enabled: false  # TLS handled by the wrapper ingress
    clusterIP:
      name: harbor

  ## External URL — MUST match harbor.<global.domain>
  ## Override this at deploy time via ArgoCD application values:
  ##   harbor.externalURL: "https://harbor.{{ .Values.global.domain }}"
  ## Default uses the sovereign dogfood domain.
  externalURL: "https://harbor.sovereign-autarky.dev"

  ## ── Persistence — Ceph storage ─────────────────────────────────────────
  persistence:
    enabled: true
    resourcePolicy: "keep"
    persistentVolumeClaim:
      registry:
        storageClass: "local-path"
        size: "50Gi"
        accessMode: ReadWriteOnce
      jobservice:
        storageClass: "local-path"
        size: "1Gi"
        accessMode: ReadWriteOnce
      database:
        storageClass: "local-path"
        size: "5Gi"
        accessMode: ReadWriteOnce
      redis:
        storageClass: "local-path"
        size: "1Gi"
        accessMode: ReadWriteOnce
      trivy:
        storageClass: "local-path"
        size: "5Gi"
        accessMode: ReadWriteOnce
    ## Object storage for artifacts via Ceph S3 (ceph-bucket StorageClass)
    ## imageChartStorage uses S3-compatible Ceph RGW endpoint
    imageChartStorage:
      disableredirect: true
      type: filesystem
      filesystem:
        rootdirectory: /storage
      ## S3/Ceph backend (re-enable when Rook-Ceph RGW is available):
      ## type: s3
      ## s3:
      ##   region: us-east-1
      ##   bucket: harbor-registry
      ##   regionendpoint: "http://rook-ceph-rgw-ceph-objectstore.rook-ceph.svc.cluster.local"
      ##   accesskey: "REPLACEME"
      ##   secretkey: "REPLACEME"

  ## ── High Availability ───────────────────────────────────────────────────
  portal:
    replicaCount: 2
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "200m"
        memory: "256Mi"
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: component
                    operator: In
                    values:
                      - portal
              topologyKey: kubernetes.io/hostname

  core:
    replicaCount: 2
    updateStrategy:
      type: RollingUpdate
    resources:
      requests:
        cpu: "100m"
        memory: "64Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: component
                    operator: In
                    values:
                      - core
              topologyKey: kubernetes.io/hostname

  jobservice:
    replicaCount: 2
    resources:
      requests:
        cpu: "100m"
        memory: "64Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: component
                    operator: In
                    values:
                      - jobservice
              topologyKey: kubernetes.io/hostname

  registry:
    replicaCount: 2
    ## Per-container resources — upstream keys for registry and registryctl containers
    registry:
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "500m"
          memory: "1Gi"
    controller:
      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
        limits:
          cpu: "200m"
          memory: "256Mi"
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: component
                    operator: In
                    values:
                      - registry
              topologyKey: kubernetes.io/hostname

  ## ── Trivy scanner ─────────────────────────────────────────────────────
  ## Disabled: trivy-operator in trivy-system covers vulnerability scanning.
  ## Enabling this held 512Mi of memory request on each worker node, causing
  ## harbor-core to remain Pending due to insufficient memory on kind nodes.
  trivy:
    enabled: false
    replicaCount: 1
    resources:
      requests:
        cpu: "200m"
        memory: "512Mi"
      limits:
        cpu: "1"
        memory: "1Gi"

  ## ── Authentication — Keycloak OIDC ─────────────────────────────────────
  ## Harbor OIDC integration: configure after deploy via admin UI or API.
  ## Settings below are applied via harbor-values ConfigMap and picked up
  ## by the harbor-core job on first boot.
  ##
  ## OIDC provider: Keycloak realm `sovereign`, client `sovereign-harbor`
  ## Endpoint: https://auth.<domain>/realms/sovereign
  ##
  ## To configure programmatically after Harbor is running:
  ##   curl -u admin:$HARBOR_PASS -X PUT https://harbor.<domain>/api/v2.0/configurations \
  ##     -H 'Content-Type: application/json' \
  ##     -d '{"auth_mode":"oidc_auth","oidc_name":"Sovereign SSO",...}'
  ##
  ## auth_mode default is "db_auth" (local DB) — switch to "oidc_auth" after Keycloak is up

  ## ── Secrets ─────────────────────────────────────────────────────────────
  secretKey: "not-a-secure-key"  # 16-char AES key — use Sealed Secret in prod
  harborAdminPassword: "Harbor12345"           # placeholder — use Sealed Secret in prod

  ## ── nginx reverse proxy ─────────────────────────────────────────────────
  nginx:
    resources:
      requests:
        cpu: "10m"
        memory: "16Mi"
      limits:
        cpu: "100m"
        memory: "64Mi"

  ## ── Database (built-in PostgreSQL) ──────────────────────────────────────
  database:
    type: internal
    internal:
      password: "changeit"  # placeholder — use Sealed Secret in prod
      ## QEMU workaround: /docker-healthcheck.sh runs too slowly under x86 emulation
      ## on ARM64 host. Increase from default 1s to avoid perpetual 0/1 not-ready.
      readinessProbe:
        timeoutSeconds: 10
      livenessProbe:
        timeoutSeconds: 10
      resources:
        requests:
          cpu: "100m"
          memory: "256Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"
      ## data-permissions-ensurer init container
      initContainer:
        permissions:
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"

  ## ── Redis (built-in) ────────────────────────────────────────────────────
  ## ARM64/QEMU workaround: after deploy, patch the StatefulSet to add:
  ##   command: ["/usr/bin/redis-server"]
  ##   args: ["/etc/redis.conf", "--stop-writes-on-bgsave-error", "no"]
  ## The bgsave child process crashes with SIGSEGV (addr=0x20, QEMU bug) after
  ## successfully writing the RDB. Without this flag, Redis blocks all writes.
  ## The upstream chart does not expose command/args overrides; patch directly:
  ##   kubectl -n harbor patch statefulset harbor-redis --type=json \
  ##     -p='[{"op":"add","path":"/spec/template/spec/containers/0/command",
  ##           "value":["/usr/bin/redis-server"]},
  ##          {"op":"add","path":"/spec/template/spec/containers/0/args",
  ##           "value":["/etc/redis.conf","--stop-writes-on-bgsave-error","no"]}]'
  redis:
    type: internal
    internal:
      resources:
        requests:
          cpu: "10m"
          memory: "64Mi"
        limits:
          cpu: "100m"
          memory: "128Mi"

  ## ── Notary — disabled (deprecated in Harbor 2.6+) ──────────────────────
  notary:
    enabled: false

## ── Sovereign wrapper config ────────────────────────────────────────────────
sovereign:
  ## Whether to create PodDisruptionBudgets (in addition to subchart PDBs)
  createPodDisruptionBudgets: true
