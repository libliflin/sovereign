apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "victorialogs-sovereign.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "victorialogs-sovereign.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/cluster-issuer: "sovereign-ca-issuer"
    nginx.ingress.kubernetes.io/proxy-body-size: "64m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - {{ include "victorialogs-sovereign.host" . | quote }}
      secretName: victorialogs-tls
  rules:
    - host: {{ include "victorialogs-sovereign.host" . | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-victorialogs-server
                port:
                  number: 9428
