replicaCount: 2

global:
  domain: "sovereign-autarky.dev"
  storageClass: "ceph-block"
  imageRegistry: ""  # set to harbor.<domain>/sovereign after Harbor is running
  keycloak:
    url: "https://auth.sovereign-autarky.dev"
    realm: "sovereign"

image:
  repository: "grafana/k6-operator"
  name: "grafana/k6-operator"
  tag: "v0.0.15-abc1234-p0"
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

podDisruptionBudget:
  minAvailable: 1
