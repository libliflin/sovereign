global:
  domain: "sovereign-autarky.dev"
  storageClass: "ceph-block"
  imageRegistry: ""
  keycloak:
    url: "https://auth.sovereign-autarky.dev"
    realm: "sovereign"

# Grafana tempo-distributed chart values
tempo:
  storage:
    trace:
      backend: s3
      s3:
        bucket: tempo
        endpoint: rook-ceph-rgw-sovereign.rook-ceph.svc.cluster.local
        region: us-east-1
        access_key: ${TEMPO_S3_ACCESS_KEY}
        secret_key: ${TEMPO_S3_SECRET_KEY}
        insecure: true

  # Distributor — replicaCount: 2 minimum for HA
  distributor:
    replicas: 2
    replicaCount: 2
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

  # Ingester — replicaCount: 2 minimum for HA
  ingester:
    replicas: 2
    replicaCount: 2
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi

  # Querier — replicaCount: 2 minimum for HA
  querier:
    replicas: 2
    replicaCount: 2
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

  # Query Frontend — replicaCount: 2 minimum for HA
  queryFrontend:
    replicas: 2
    replicaCount: 2
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi

  # Compactor
  compactor:
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
