apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-datasource-tempo
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tempo-wrapper.labels" . | nindent 4 }}
    grafana_datasource: "1"
data:
  tempo-datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Tempo
        type: tempo
        access: proxy
        url: http://{{ .Release.Name }}-tempo-query-frontend.{{ .Release.Namespace }}.svc.cluster.local:3100
        version: 1
        editable: false
        jsonData:
          httpMethod: GET
          tracesToLogs:
            datasourceUid: loki
            tags:
              - compose
              - container
