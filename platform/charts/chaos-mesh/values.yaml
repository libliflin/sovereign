replicaCount: 2  # required by ha-gate.sh — mirrors chaos-mesh.controllerManager.replicaCount

global:
  domain: "sovereign-autarky.dev"
  storageClass: "ceph-block"
  imageRegistry: ""  # set to harbor.<domain>/sovereign after Harbor is running
  keycloak:
    url: "https://auth.sovereign-autarky.dev"
    realm: "sovereign"

# Upstream chaos-mesh chart configuration.
# Values nested under the alias key "chaos-mesh" are passed to the sub-chart.
chaos-mesh:
  controllerManager:
    replicaCount: 2
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: chaos-mesh
                  app.kubernetes.io/component: controller-manager
              topologyKey: kubernetes.io/hostname
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    # Override pause image away from deprecated gcr.io path
    podChaos:
      podFailure:
        pauseImage: registry.k8s.io/pause:3.9

  chaosDaemon:
    # kind clusters use containerd, not docker
    runtime: containerd
    socketPath: /run/containerd/containerd.sock
    privileged: true
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

  # Disable optional components not needed for kind testing
  dashboard:
    create: false
  dnsServer:
    create: false
  prometheus:
    create: false
