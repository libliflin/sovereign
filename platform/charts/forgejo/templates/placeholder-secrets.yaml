{{- if .Values.sovereign.createPlaceholderSecrets }}
{{/*
  These placeholder secrets allow `helm template` and `helm lint` to pass
  in environments where the real sealed secrets haven't been created yet.
  In production, set sovereign.createPlaceholderSecrets: false and
  pre-create these secrets via kubeseal before deploying.

  Required secrets:
    forgejo-admin-secret
      adminName:     Forgejo admin username
      adminPassword: Forgejo admin password
      adminEmail:    Forgejo admin email

    forgejo-postgresql-secret
      password: PostgreSQL password for the forgejo user

    forgejo-keycloak-oidc-secret
      key:    OAuth2 client ID registered in Keycloak realm
      secret: OAuth2 client secret
*/}}
---
apiVersion: v1
kind: Secret
metadata:
  name: forgejo-admin-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "forgejo-sovereign.labels" . | nindent 4 }}
  annotations:
    sovereign/placeholder: "true"
type: Opaque
stringData:
  adminName: "sovereign-admin"
  adminPassword: "change-me-before-production"
  adminEmail: "admin@sovereign.local"
---
apiVersion: v1
kind: Secret
metadata:
  name: forgejo-postgresql-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "forgejo-sovereign.labels" . | nindent 4 }}
  annotations:
    sovereign/placeholder: "true"
type: Opaque
stringData:
  password: "change-me-before-production"
---
apiVersion: v1
kind: Secret
metadata:
  name: forgejo-keycloak-oidc-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "forgejo-sovereign.labels" . | nindent 4 }}
  annotations:
    sovereign/placeholder: "true"
type: Opaque
stringData:
  key: "forgejo-client-id"
  secret: "change-me-before-production"
{{- end }}
