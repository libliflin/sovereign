## Sovereign Platform — Forgejo wrapper chart values
## All hostnames derived from global.domain — never hardcode.

global:
  domain: "sovereign-autarky.dev"
  storageClass: "local-path"

## ── Forgejo subchart values (alias: forgejo) ────────────────────────────────
forgejo:

  ## ── Admin credentials — from secret, never in values ──────────────────
  admin:
    existingSecret: forgejo-admin-secret

  ## ── Core app.ini configuration ─────────────────────────────────────────
  gitea:
    config:
      server:
        DOMAIN: "forgejo.sovereign-autarky.dev"
        ROOT_URL: "https://forgejo.sovereign-autarky.dev/"
        SSH_DOMAIN: "forgejo.sovereign-autarky.dev"
        SSH_PORT: 22
        LFS_START_SERVER: true

      lfs:
        PATH: /data/git/lfs

      database:
        DB_TYPE: postgres
        HOST: "forgejo-postgresql.forgejo.svc.cluster.local:5432"
        NAME: forgejo
        USER: forgejo
        PASSWD: "Forgejo12345"
        SCHEMA: public
        SSL_MODE: disable

      session:
        PROVIDER: db

      cache:
        ADAPTER: memory

      queue:
        TYPE: level

      indexer:
        ISSUE_INDEXER_TYPE: db
        REPO_INDEXER_ENABLED: false

      security:
        INSTALL_LOCK: true

    ## ── Keycloak OIDC via OAuth2 ─────────────────────────────────────────
    ## Secret forgejo-keycloak-oidc-secret must contain:
    ##   key:    the OAuth2 client ID
    ##   secret: the OAuth2 client secret
    ## oauth disabled until Keycloak sovereign realm exists.
    ## Re-enable once: http://keycloak.keycloak.svc.cluster.local/realms/sovereign → 200
    ## oauth:
    ##   - name: Keycloak
    ##     provider: openidConnect
    ##     existingSecret: forgejo-keycloak-oidc-secret
    ##     autoDiscoverUrl: "http://keycloak.keycloak.svc.cluster.local/realms/sovereign/.well-known/openid-configuration"
    ##     iconUrl: "https://auth.sovereign-autarky.dev/favicon.ico"
    ##     scopes: openid email profile groups

  ## ── PostgreSQL — built-in bitnami subchart ──────────────────────────────
  postgresql:
    enabled: true
    global:
      postgresql:
        auth:
          username: forgejo
          password: "Forgejo12345"
          database: forgejo
    primary:
      persistence:
        size: "5Gi"
        storageClass: "local-path"

  postgresql-ha:
    enabled: false

  ## ── Redis — disabled; using DB session/cache for simplicity ───────────
  redis-cluster:
    enabled: false

  redis:
    enabled: false

  ## ── Persistence ─────────────────────────────────────────────────────────
  persistence:
    enabled: true
    storageClass: "local-path"
    size: "20Gi"
    accessModes:
      - ReadWriteOnce

  ## ── HA — single replica (RWX not available with local-path; revisit with Ceph)
  replicaCount: 1

  podDisruptionBudget:
    maxUnavailable: 1

  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                    - forgejo
            topologyKey: kubernetes.io/hostname

  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  ## ── Ingress — managed by our own template (see templates/ingress.yaml) ──
  ingress:
    enabled: false

## ── Sovereign wrapper config ─────────────────────────────────────────────────
## Values used only by our own templates (not the forgejo subchart)
sovereign:
  createPlaceholderSecrets: true
