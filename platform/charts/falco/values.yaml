global:
  domain: "sovereign-autarky.dev"
  storageClass: "local-path"
  imageRegistry: ""
  keycloak:
    url: "https://auth.sovereign-autarky.dev"
    realm: "sovereign"

# falco subchart values
falco:
  # JSON output to stdout for Loki scraping
  falco:
    json_output: true
    log_stderr: true
    # Disable built-in webserver — we use stdout/Loki only
    webserver:
      enabled: false

  # DaemonSet — runs on every node for full coverage
  # (no replicaCount for DaemonSets — they're inherently HA)

  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  # Driver mode: modern_ebpf uses CO-RE (embedded in falco binary, no kernel headers
  # required). Works on kernels 5.8+ with BTF support. linuxkit 6.10.14 qualifies.
  driver:
    kind: modern_ebpf
    loader:
      initContainer:
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"

  falcoctl:
    artifact:
      install:
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"
      follow:
        # Disabled: pulls updated rules from falcosecurity.github.io (external) — T1 violation
        # Rules are installed at startup by the init container; live updates not needed.
        enabled: false
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"
