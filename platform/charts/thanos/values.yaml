global:
  domain: "sovereign-autarky.dev"
  storageClass: "ceph-block"
  imageRegistry: ""
  keycloak:
    url: "https://auth.sovereign-autarky.dev"
    realm: "sovereign"

# Bitnami Thanos chart values
thanos:
  # Object store config — ceph-bucket (S3-compatible)
  objstoreConfig: |-
    type: S3
    config:
      bucket: thanos
      endpoint: rook-ceph-rgw-sovereign.rook-ceph.svc.cluster.local
      region: us-east-1
      access_key: ${THANOS_S3_ACCESS_KEY}
      secret_key: ${THANOS_S3_SECRET_KEY}
      insecure: true

  # Sidecar — connects to Prometheus
  sidecar:
    enabled: true
    prometheus:
      url: "http://prometheus-stack-kube-promethe-prometheus.monitoring.svc.cluster.local:9090"

  # Query (Querier)
  query:
    enabled: true
    replicaCount: 2
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/component: query
              topologyKey: kubernetes.io/hostname
    podDisruptionBudget:
      enabled: true
      minAvailable: 1

  # Store Gateway
  storegateway:
    enabled: true
    replicaCount: 2
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/component: storegateway
              topologyKey: kubernetes.io/hostname
    podDisruptionBudget:
      enabled: true
      minAvailable: 1

  # Compactor
  compactor:
    enabled: true
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi

  # Ruler disabled (handled by Prometheus)
  ruler:
    enabled: false
