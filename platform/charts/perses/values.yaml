## Sovereign Platform — Perses wrapper chart values
## CNCF Sandbox, Apache 2.0. GitOps-native dashboards as code.
## Replaces Grafana (AGPL-3.0).

global:
  domain: "sovereign-autarky.dev"
  storageClass: "standard"

# Top-level replicaCount satisfies the sovereign HA gate.
# The upstream perses subchart uses `replicas` (see perses.replicas below).
replicaCount: 2

perses:
  # Upstream perses chart uses `replicas`, not `replicaCount`.
  replicas: 2

  ## Perses stores dashboard definitions in its own database.
  ## Dashboards can also be managed as CRs via the perses-operator.
  persistence:
    enabled: true
    storageClass: "standard"
    size: "5Gi"

  ## Data sources — configured at deploy time or via CR
  ## Prometheus and Jaeger are pre-wired via the datasource CRs in templates/
  config:
    database:
      file:
        folder: /data/perses

    ## Keycloak OIDC — upstream schema path: config.security.authentication.providers.oidc
    ## The top-level `security` key is not in the upstream schema.
    security:
      enable_auth: true
      authentication:
        providers:
          oidc:
            - slug_id: keycloak
              name: Keycloak
              client_id: "sovereign-perses"
              client_secret: "${PERSES_OIDC_SECRET}"
              discovery_url: "https://auth.sovereign-autarky.dev/realms/sovereign/.well-known/openid-configuration"

  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

  ingress:
    enabled: false

## PodDisruptionBudget and podAntiAffinity are managed by wrapper templates
## in templates/pdb.yaml and templates/affinity.yaml respectively.
## They cannot be passed through to the subchart: the upstream values.schema.json
## uses additionalProperties: false and does not include these keys.
