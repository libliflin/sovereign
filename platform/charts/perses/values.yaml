## Sovereign Platform — Perses wrapper chart values
## CNCF Sandbox, Apache 2.0. GitOps-native dashboards as code.
## Replaces Grafana (AGPL-3.0).
##
## ha_exception: Perses uses a file-based database on a single PVC (ReadWriteOnce).
## Multiple replicas would race on writes. See platform/vendor/VENDORS.yaml.

global:
  domain: "sovereign-autarky.dev"
  storageClass: "standard"

replicaCount: 1  # ha_exception: see vendor/VENDORS.yaml

perses:
  ## Upstream chart uses `replicas`, not `replicaCount`.
  ## additionalProperties: false in upstream schema — only pass documented keys.
  replicas: 1

  ## Perses stores dashboard definitions in its own database.
  ## Dashboards can also be managed as CRs via the perses-operator.
  persistence:
    enabled: true
    storageClass: "standard"
    size: "5Gi"

  ## Data sources — configured at deploy time or via CR
  ## Prometheus and Jaeger are pre-wired via the datasource CRs in templates/
  config:
    database:
      file:
        folder: /data/perses

  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

  ingress:
    enabled: false
