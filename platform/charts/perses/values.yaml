## Sovereign Platform — Perses wrapper chart values
## CNCF Sandbox, Apache 2.0. GitOps-native dashboards as code.
## Replaces Grafana (AGPL-3.0).

global:
  domain: "sovereign-autarky.dev"
  storageClass: "standard"

## ha_exception: perses uses a file-based database that is architecturally single-instance.
## Multiple replicas would conflict on the same PVC. See platform/vendor/VENDORS.yaml.
podDisruptionBudget:
  minAvailable: 1

perses:
  ## Upstream key is `replicas`, not `replicaCount`.
  ## Single instance — file-based database cannot be shared across pods.
  replicas: 1  # ha_exception: see vendor/VENDORS.yaml

  ## Perses stores dashboard definitions in its own database.
  ## Dashboards can also be managed as CRs via the perses-operator.
  persistence:
    enabled: true
    storageClass: "standard"
    size: "5Gi"

  ## Data sources — configured at deploy time or via CR
  ## Prometheus and Jaeger are pre-wired via the datasource CRs in templates/
  config:
    database:
      file:
        folder: /data/perses

  ## OIDC is not supported in the upstream perses 0.8.0 Helm chart schema.
  ## Configure authentication via the config.security section when upgrading
  ## to a Perses version whose Helm chart accepts it.

  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

  ingress:
    enabled: false
