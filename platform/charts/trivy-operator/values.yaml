global:
  domain: "sovereign-autarky.dev"
  storageClass: "local-path"
  imageRegistry: ""
  keycloak:
    url: "https://auth.sovereign-autarky.dev"
    realm: "sovereign"

# trivy-operator subchart values
trivy-operator:
  # Scan all namespaces (empty string = all)
  targetNamespaces: ""

  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                    - trivy-operator
            topologyKey: kubernetes.io/hostname

  # Enable vulnerability and config audit reports
  trivyOperator:
    scanJobTimeout: 5m

  operator:
    vulnerabilityReportsPlugin: "Trivy"
    configAuditReportsPlugin: "Trivy"
    # Scan images when new workloads are created or updated
    scanJobsConcurrentLimit: 3

  # Resource limits for the operator controller pod itself
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  trivy:
    # Use filesystem mode for scanning
    mode: Standalone
    resources:
      requests:
        cpu: "100m"
        memory: "100Mi"
      limits:
        cpu: "500m"
        memory: "500Mi"
