apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: trivy-operator
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: trivy-operator
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: trivy-operator
      app.kubernetes.io/instance: {{ .Release.Name }}
