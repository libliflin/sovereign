global:
  domain: "sovereign-autarky.dev"
  storageClass: "local-path"
  imageRegistry: ""
  keycloak:
    url: "https://auth.sovereign-autarky.dev"
    realm: "sovereign"

# gatekeeper subchart values
gatekeeper:
  replicaCount: 2
  controllerManager:
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "1000m"
        memory: "512Mi"
  audit:
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "1000m"
        memory: "512Mi"
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

# Constraint enforcement action: deny | dryrun | warn
constraintEnforcementAction: deny

# Two-pass install: false on first pass (CRDs + controller + templates),
# true on second pass (constraints require K8s* CRDs from ConstraintTemplate processing)
constraintsEnabled: false

# Namespaces exempt from the no-privilege-escalation constraint.
# Falco (runtime security DaemonSet) requires privileged: true for eBPF syscall monitoring.
privilegeEscalationExcludedNamespaces:
  - falco

# Namespaces exempt from the require-labels constraint.
# Upstream charts (trivy-operator) don't include sovereign-convention labels (app, tier).
requireLabelsExcludedNamespaces:
  - trivy-system
