global:
  domain: "sovereign-autarky.dev"
  storageClass: "local-path"
  imageRegistry: ""
  keycloak:
    url: "https://auth.sovereign-autarky.dev"
    realm: "sovereign"

replicaCount: 2

image:
  repository: "ghcr.io/backstage/backstage"
  name: "backstage/backstage"
  tag: "1.30.2"
  pullPolicy: IfNotPresent

keycloak:
  url: "https://auth.sovereign-autarky.dev"
  realm: "sovereign"
  clientId: "backstage"

service:
  type: ClusterIP
  port: 7007

ingress:
  enabled: true
  className: "traefik"
  annotations:
    cert-manager.io/cluster-issuer: "sovereign-ca-issuer"
  tls: true

podDisruptionBudget:
  minAvailable: 1

readinessProbe:
  httpGet:
    path: /healthcheck
    port: 7007
  initialDelaySeconds: 15
  periodSeconds: 10

livenessProbe:
  httpGet:
    path: /healthcheck
    port: 7007
  initialDelaySeconds: 30
  periodSeconds: 30

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

postgresql:
  enabled: true
  image:
    registry: ""
    repository: "bitnami/postgresql"
    tag: "16.3.0-debian-12-r14"
    pullPolicy: IfNotPresent
  auth:
    database: "backstage"
    username: "backstage"
    password: "backstage-dev"
  storage:
    size: "5Gi"
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

backstage:
  appConfig:
    catalog:
      providers:
        forgejo:
          host: "forgejo.sovereign-autarky.dev"
          catalogPath: "/catalog-info.yaml"
          branch: "main"
          entityFilename: "catalog-info.yaml"
    kubernetes:
      serviceLocatorMethod:
        type: "multiTenant"
      clusterLocatorMethods:
        - type: "config"
          clusters:
            - url: "https://kubernetes.default.svc"
              name: "sovereign"
              authProvider: "serviceAccount"
              skipTLSVerify: false
              skipMetricsLookup: false
    argocd:
      username: "admin"
      password: ""
      appLocatorMethods:
        - type: "config"
          instances:
            - name: "sovereign"
              url: "https://argocd.sovereign-autarky.dev"
    techdocs:
      builder: "external"
      generator:
        runIn: "docker"
      publisher:
        type: "awsS3"
        awsS3:
          bucketName: "techdocs"
          region: "us-east-1"
          endpoint: "https://s3.sovereign-autarky.dev"
          s3ForcePathStyle: true
