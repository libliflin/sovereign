apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "backstage.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "backstage.labels" . | nindent 4 }}
    app: backstage
    tier: devex
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "backstage.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        {{- include "backstage.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      # podAntiAffinity: spread replicas across nodes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    {{- include "backstage.selectorLabels" . | nindent 20 }}
                topologyKey: kubernetes.io/hostname
      containers:
        - name: backstage
          image: {{ include "backstage.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            - name: APP_CONFIG_app_baseUrl
              value: "https://{{ include "backstage.host" . }}"
            - name: APP_CONFIG_backend_baseUrl
              value: "https://{{ include "backstage.host" . }}"
            - name: APP_CONFIG_auth_providers_oidc_production_clientId
              value: {{ .Values.keycloak.clientId | quote }}
            - name: APP_CONFIG_auth_providers_oidc_production_metadataUrl
              value: "{{ include "backstage.oidcIssuerURL" . }}/.well-known/openid-configuration"
            - name: BACKSTAGE_KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "backstage.fullname" . }}-keycloak
                  key: clientSecret
            {{- if .Values.postgresql.enabled }}
            - name: APP_CONFIG_backend_database_client
              value: "pg"
            - name: APP_CONFIG_backend_database_connection_host
              value: "{{ include "backstage.fullname" . }}-postgresql"
            - name: APP_CONFIG_backend_database_connection_port
              value: "5432"
            - name: APP_CONFIG_backend_database_connection_user
              value: {{ .Values.postgresql.auth.username | quote }}
            - name: APP_CONFIG_backend_database_connection_password
              value: {{ .Values.postgresql.auth.password | quote }}
            {{- end }}
          volumeMounts:
            - name: app-config
              mountPath: /app/app-config.production.yaml
              subPath: app-config.production.yaml
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: app-config
          configMap:
            name: {{ include "backstage.fullname" . }}-app-config
