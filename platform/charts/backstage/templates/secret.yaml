apiVersion: v1
kind: Secret
metadata:
  name: {{ include "backstage.fullname" . }}-keycloak
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "backstage.labels" . | nindent 4 }}
type: Opaque
stringData:
  clientSecret: {{ required "keycloak.clientSecret must be set — an empty client secret silently breaks OIDC authentication. Override via cluster-values.yaml or SealedSecret." .Values.keycloak.clientSecret | quote }}
