apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "zot.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "zot.labels" . | nindent 4 }}
data:
  config.json: |
    {
      "distSpecVersion": {{ .Values.config.distSpecVersion | quote }},
      "storage": {
        "rootDirectory": {{ .Values.config.storage.rootDirectory | quote }},
        "dedupe": {{ .Values.config.storage.dedupe }},
        "commit": {{ .Values.config.storage.commit }}
      },
      "http": {
        "address": {{ .Values.config.http.address | quote }},
        "port": {{ .Values.config.http.port | quote }}
      },
      "log": {
        "level": {{ .Values.config.log.level | quote }}
      },
      "extensions": {
        "metrics": {
          "enable": {{ .Values.config.extensions.metrics.enable }},
          "prometheus": {
            "path": {{ .Values.config.extensions.metrics.prometheus.path | quote }}
          }
        },
        "search": {
          "enable": {{ .Values.config.extensions.search.enable }}
        },
        "ui": {
          "enable": {{ .Values.config.extensions.ui.enable }}
        }
      }
    }
