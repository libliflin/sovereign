{{- if .Values.providers.helm.enabled }}
apiVersion: pkg.crossplane.io/v1
kind: Provider
metadata:
  name: provider-helm
  labels:
    {{- include "crossplane-sovereign.labels" . | nindent 4 }}
spec:
  package: {{ .Values.providers.helm.package | quote }}
  installRuntimeConfig:
    spec:
      serviceAccountName: provider-helm
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: provider-helm
  namespace: crossplane-system
  labels:
    {{- include "crossplane-sovereign.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: provider-helm-cluster-admin
  labels:
    {{- include "crossplane-sovereign.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: provider-helm
    namespace: crossplane-system
{{- end }}
