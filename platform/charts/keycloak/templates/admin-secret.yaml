# ---------------------------------------------------------------------------
# Keycloak Admin Secret
#
# DO NOT store plaintext passwords here. Use Sealed Secrets:
#
#   kubectl create secret generic keycloak-admin-secret \
#     --from-literal=admin-password='your-secure-password' \
#     --dry-run=client -o yaml | \
#     kubeseal --controller-name=sealed-secrets-controller \
#              --controller-namespace=sealed-secrets \
#              --format=yaml > charts/keycloak/templates/admin-sealed-secret.yaml
#
# Then commit the SealedSecret. The controller decrypts it into a regular
# Secret named 'keycloak-admin-secret' in the keycloak namespace.
#
# The Secret must have key: admin-password
# ---------------------------------------------------------------------------
