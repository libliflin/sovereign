{{/*
GitLab main ingress — handles the web UI at gitlab.<domain>
The upstream gitlab/gitlab chart manages its own ingresses for sub-services
(registry, shell, etc.) via global.hosts. We add this wrapper ingress for
visibility and to ensure TLS is configured via our cert-manager issuer.
*/}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "gitlab-sovereign.fullname" . }}-web
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gitlab-sovereign.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/cluster-issuer: "sovereign-ca-issuer"
    nginx.ingress.kubernetes.io/proxy-body-size: "512m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "300"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - {{ include "gitlab-sovereign.gitlabHost" . | quote }}
        - {{ include "gitlab-sovereign.registryHost" . | quote }}
      secretName: gitlab-tls
  rules:
    - host: {{ include "gitlab-sovereign.gitlabHost" . | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-webservice-default
                port:
                  number: 8181
    - host: {{ include "gitlab-sovereign.registryHost" . | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-registry
                port:
                  number: 5000
