{{/*
Placeholder secrets for dry-run and local testing.
In production, replace these with Sealed Secrets generated via kubeseal.

To create real secrets:
  kubectl create secret generic gitlab-initial-root-password \
    --from-literal=password='<secure-password>' -n gitlab \
    | kubeseal --controller-name sealed-secrets-controller \
               --controller-namespace kube-system \
               --format yaml > charts/gitlab/sealed-secrets/root-password.yaml

  kubectl create secret generic gitlab-postgresql-secret \
    --from-literal=password='<db-password>' -n gitlab \
    | kubeseal ...

  kubectl create secret generic gitlab-object-store-credentials \
    --from-literal=connection='<ceph-s3-connection-yaml>' -n gitlab \
    | kubeseal ...

  kubectl create secret generic gitlab-keycloak-oidc-secret \
    --from-literal=provider='<omniauth-provider-json>' -n gitlab \
    | kubeseal ...
*/}}
{{- if .Values.sovereign.createPlaceholderSecrets }}
---
apiVersion: v1
kind: Secret
metadata:
  name: gitlab-initial-root-password
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gitlab-sovereign.labels" . | nindent 4 }}
  annotations:
    sovereign/replace-with-sealed-secret: "true"
    sovereign/instructions: "Create via kubeseal before production deployment"
type: Opaque
stringData:
  ## PLACEHOLDER — replace with kubeseal Sealed Secret in production
  password: "changeme-replace-with-sealed-secret"
---
apiVersion: v1
kind: Secret
metadata:
  name: gitlab-postgresql-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gitlab-sovereign.labels" . | nindent 4 }}
  annotations:
    sovereign/replace-with-sealed-secret: "true"
type: Opaque
stringData:
  ## PLACEHOLDER — replace with kubeseal Sealed Secret in production
  password: "changeme-replace-with-sealed-secret"
---
apiVersion: v1
kind: Secret
metadata:
  name: gitlab-object-store-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gitlab-sovereign.labels" . | nindent 4 }}
  annotations:
    sovereign/replace-with-sealed-secret: "true"
    sovereign/instructions: "Set to Ceph RGW S3 credentials — see docs/day-2-operations.md"
type: Opaque
stringData:
  ## PLACEHOLDER — replace with actual Ceph S3 connection YAML
  ## Format: https://docs.gitlab.com/ee/administration/object_storage.html
  connection: |
    provider: AWS
    region: us-east-1
    aws_access_key_id: "REPLACEME"
    aws_secret_access_key: "REPLACEME"
    aws_signature_version: 4
    host: "rook-ceph-rgw-ceph-objectstore.rook-ceph.svc.cluster.local"
    endpoint: "http://rook-ceph-rgw-ceph-objectstore.rook-ceph.svc.cluster.local"
    path_style: true
---
apiVersion: v1
kind: Secret
metadata:
  name: gitlab-keycloak-oidc-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gitlab-sovereign.labels" . | nindent 4 }}
  annotations:
    sovereign/replace-with-sealed-secret: "true"
    sovereign/instructions: "Set to Keycloak OIDC provider config — see docs/day-2-operations.md"
type: Opaque
stringData:
  ## PLACEHOLDER — replace with actual Keycloak OIDC provider JSON
  ## Format: https://docs.gitlab.com/ee/integration/openid_connect_provider.html
  provider: |
    {
      "name": "openid_connect",
      "label": "Sovereign SSO",
      "args": {
        "name": "openid_connect",
        "scope": ["openid", "profile", "email"],
        "response_type": "code",
        "issuer": "https://auth.REPLACEME.example.com/realms/sovereign",
        "client_auth_method": "query",
        "discovery": true,
        "uid_field": "preferred_username",
        "client_options": {
          "identifier": "sovereign-gitlab",
          "secret": "REPLACEME",
          "redirect_uri": "https://gitlab.REPLACEME.example.com/users/auth/openid_connect/callback"
        }
      }
    }
{{- end }}
