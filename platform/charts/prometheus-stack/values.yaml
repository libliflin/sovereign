global:
  domain: "sovereign-autarky.dev"
  storageClass: "local-path"
  imageRegistry: ""  # set to harbor.<domain>/sovereign after Harbor is running
  keycloak:
    url: "https://auth.sovereign-autarky.dev"
    realm: "sovereign"

# kube-prometheus-stack upstream chart values
kube-prometheus-stack:
  # Grafana disabled — dashboards served by Perses (Apache 2.0, CNCF Sandbox)
  # See platform/charts/perses/
  grafana:
    enabled: false

  # ----- Prometheus -----
  prometheus:
    prometheusSpec:
      replicas: 2
      retention: 15d

      # Ceph-backed persistent storage
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: local-path
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 5Gi

      resources:
        requests:
          cpu: 200m
          memory: 1Gi
        limits:
          cpu: 1000m
          memory: 4Gi

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: prometheus
                topologyKey: kubernetes.io/hostname

    podDisruptionBudget:
      enabled: true
      minAvailable: 1

  # ----- AlertManager -----
  alertmanager:
    alertmanagerSpec:
      replicas: 2

      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 256Mi

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: alertmanager
                topologyKey: kubernetes.io/hostname

    podDisruptionBudget:
      enabled: true
      minAvailable: 1

    # AlertManager stub config — replace receivers with real integrations
    config:
      global:
        resolve_timeout: 5m
      route:
        group_by:
          - job
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 12h
        receiver: "null"
        routes:
          - match:
              alertname: Watchdog
            receiver: "null"
          - match:
              severity: critical
            receiver: slack-stub
      receivers:
        - name: "null"
        - name: slack-stub
          # Replace with real Slack webhook URL via SealedSecret
          slack_configs:
            - api_url: "https://hooks.slack.com/services/REPLACE/WITH/REAL"
              channel: "#alerts"
              send_resolved: true
              title: '{{ template "slack.default.title" . }}'
              text: '{{ template "slack.default.text" . }}'
      templates:
        - "/etc/alertmanager/config/*.tmpl"

  # ----- node-exporter DaemonSet -----
  prometheus-node-exporter:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

  # ----- kube-state-metrics Deployment -----
  kube-state-metrics:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

  # ----- Prometheus Operator -----
  prometheusOperator:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
    admissionWebhooks:
      patch:
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 50m
            memory: 64Mi
