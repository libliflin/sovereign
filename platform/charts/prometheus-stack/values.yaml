global:
  domain: "sovereign-autarky.dev"
  storageClass: "ceph-block"
  imageRegistry: ""  # set to harbor.<domain>/sovereign after Harbor is running
  keycloak:
    url: "https://auth.sovereign-autarky.dev"
    realm: "sovereign"

# Keycloak OIDC for Grafana (disabled by default — enable after Keycloak is running)
grafanaOidc:
  enabled: false
  clientID: "sovereign-grafana"
  # clientSecret stored in a SealedSecret mounted at grafanaOidc.clientSecretRef
  clientSecretRef: "grafana-keycloak-secret"

# kube-prometheus-stack upstream chart values
kube-prometheus-stack:
  # ----- Grafana -----
  grafana:
    replicaCount: 2
    # Disable upstream ingress — we manage our own in templates/ingress.yaml
    ingress:
      enabled: false

    # Persistence
    persistence:
      enabled: true
      storageClassName: ceph-block
      size: 10Gi

    # Grafana.ini config
    grafana.ini:
      server:
        domain: "grafana.sovereign-autarky.dev"  # overridden at deploy time via --set
        root_url: "https://grafana.sovereign-autarky.dev"
      auth.generic_oauth:
        enabled: true
        name: "Keycloak"
        allow_sign_up: true
        client_id: "sovereign-grafana"
        client_secret: "$__env{GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}"
        scopes: "openid profile email"
        auth_url: "https://auth.sovereign-autarky.dev/realms/sovereign/protocol/openid-connect/auth"
        token_url: "https://auth.sovereign-autarky.dev/realms/sovereign/protocol/openid-connect/token"
        api_url: "https://auth.sovereign-autarky.dev/realms/sovereign/protocol/openid-connect/userinfo"
        role_attribute_path: "contains(roles[*], 'admin') && 'Admin' || 'Viewer'"

    # Sidecar picks up dashboard ConfigMaps with label grafana_dashboard="1"
    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
        labelValue: "1"
        searchNamespace: ALL

    # Liveness / readiness probes are included by upstream chart
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: grafana
              topologyKey: kubernetes.io/hostname

    podDisruptionBudget:
      minAvailable: 1

  # ----- Prometheus -----
  prometheus:
    prometheusSpec:
      replicas: 2
      retention: 15d

      # Ceph-backed persistent storage
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: ceph-block
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 50Gi

      resources:
        requests:
          cpu: 200m
          memory: 1Gi
        limits:
          cpu: 1000m
          memory: 4Gi

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: prometheus
                topologyKey: kubernetes.io/hostname

    podDisruptionBudget:
      minAvailable: 1

  # ----- AlertManager -----
  alertmanager:
    alertmanagerSpec:
      replicas: 2

      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 256Mi

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: alertmanager
                topologyKey: kubernetes.io/hostname

    podDisruptionBudget:
      minAvailable: 1

    # AlertManager stub config — replace receivers with real integrations
    config:
      global:
        resolve_timeout: 5m
      route:
        group_by:
          - job
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 12h
        receiver: "null"
        routes:
          - match:
              alertname: Watchdog
            receiver: "null"
          - match:
              severity: critical
            receiver: slack-stub
      receivers:
        - name: "null"
        - name: slack-stub
          # Replace with real Slack webhook URL via SealedSecret
          slack_configs:
            - api_url: "https://hooks.slack.com/services/REPLACE/WITH/REAL"
              channel: "#alerts"
              send_resolved: true
              title: '{{ template "slack.default.title" . }}'
              text: '{{ template "slack.default.text" . }}'
      templates:
        - "/etc/alertmanager/config/*.tmpl"

  # ----- Prometheus Operator -----
  prometheusOperator:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
