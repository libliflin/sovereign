apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-dashboard-istio
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "prometheus-stack.labels" . | nindent 4 }}
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Sovereign Platform"
data:
  istio-mesh.json: |-
    {
      "id": null,
      "uid": "sovereign-istio",
      "title": "Istio Service Mesh",
      "description": "Istio mTLS mesh: request rates, error rates, P99 latency per service",
      "tags": ["sovereign", "istio", "mesh"],
      "timezone": "browser",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "panels": [],
      "__inputs": [],
      "__requires": [
        {
          "type": "datasource",
          "id": "prometheus",
          "name": "Prometheus",
          "version": "1.0.0"
        }
      ]
    }
