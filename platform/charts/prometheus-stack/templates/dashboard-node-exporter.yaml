apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-dashboard-node-exporter
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "prometheus-stack.labels" . | nindent 4 }}
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Sovereign Platform"
data:
  node-exporter-full.json: |-
    {
      "id": null,
      "uid": "sovereign-node-exporter",
      "title": "Node Exporter Full",
      "description": "Comprehensive node metrics from node-exporter (Grafana dashboard 1860)",
      "tags": ["sovereign", "node", "infrastructure"],
      "timezone": "browser",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "panels": [],
      "__inputs": [],
      "__requires": [
        {
          "type": "datasource",
          "id": "prometheus",
          "name": "Prometheus",
          "version": "1.0.0"
        }
      ]
    }
