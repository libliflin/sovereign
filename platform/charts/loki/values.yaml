global:
  domain: "sovereign-autarky.dev"
  storageClass: "ceph-block"
  imageRegistry: ""
  keycloak:
    url: "https://auth.sovereign-autarky.dev"
    realm: "sovereign"

# Upstream loki chart values
loki:
  deploymentMode: SimpleScalable

  loki:
    commonConfig:
      replication_factor: 3
    schemaConfig:
      configs:
        - from: "2024-04-01"
          store: tsdb
          object_store: s3
          schema: v13
          index:
            prefix: index_
            period: 24h
    storage:
      type: s3
      bucketNames:
        chunks: "loki-chunks"
        ruler: "loki-ruler"
        admin: "loki-admin"
      s3:
        endpoint: "http://minio.minio.svc:9000"
        region: "us-east-1"
        accessKeyId: "${LOKI_S3_ACCESS_KEY}"
        secretAccessKey: "${LOKI_S3_SECRET_KEY}"
        s3ForcePathStyle: true
        insecure: true

  chunksCache:
    enabled: false

  resultsCache:
    enabled: false

  # Write component
  write:
    replicas: 2
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/component: write
              topologyKey: kubernetes.io/hostname

  # Read component
  read:
    replicas: 2
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/component: read
              topologyKey: kubernetes.io/hostname

  # Backend component
  backend:
    replicas: 2
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/component: backend
              topologyKey: kubernetes.io/hostname

  # Single binary disabled in SimpleScalable mode
  singleBinary:
    replicas: 0

  # Disable test pods
  test:
    enabled: false
  lokiCanary:
    enabled: false

  # Self monitoring
  monitoring:
    selfMonitoring:
      enabled: false
    lokiCanary:
      enabled: false
