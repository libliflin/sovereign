---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Release.Name }}-server-tls
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: openbao
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  secretName: {{ .Release.Name }}-server-tls
  isCA: false
  usages:
    - server auth
    - client auth
  dnsNames:
    - "{{ .Release.Name }}.{{ .Release.Namespace }}.svc"
    - "{{ .Release.Name }}.{{ .Release.Namespace }}.svc.cluster.local"
    - "{{ .Release.Name }}-internal.{{ .Release.Namespace }}.svc"
    - "{{ .Release.Name }}-internal.{{ .Release.Namespace }}.svc.cluster.local"
    - "*.{{ .Release.Name }}-internal.{{ .Release.Namespace }}.svc.cluster.local"
  issuerRef:
    kind: ClusterIssuer
    name: {{ .Values.global.clusterIssuer }}
