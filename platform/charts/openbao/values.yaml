global:
  domain: "sovereign-autarky.dev"
  storageClass: "ceph-block"
  clusterIssuer: "sovereign-ca-issuer"
  imageRegistry: ""  # set to harbor.<domain>/sovereign after Harbor is running

# ---------------------------------------------------------------------------
# Upstream openbao subchart values (alias: openbao)
# ---------------------------------------------------------------------------
openbao:
  global:
    # TLS is enabled in the HCL listener config (tls_cert_file/tls_key_file).
    # Setting tlsDisable: false makes the chart use HTTPS scheme for probes.
    tlsDisable: false

  server:
    image:
      registry: "quay.io"  # bootstrap default; override with global.imageRegistry after Harbor
      repository: "openbao/openbao"
      tag: ""  # defaults to chart appVersion (v2.5.2)
      pullPolicy: IfNotPresent

    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "512Mi"
        cpu: "500m"

    # Mount the cert-manager-issued TLS secret (created by templates/certificate.yaml)
    volumes:
      - name: tls
        secret:
          secretName: openbao-server-tls

    volumeMounts:
      - name: tls
        mountPath: /openbao/tls
        readOnly: true

    # Allow pods to pass readiness while sealed/uninitialized so all 3 HA
    # pods can start. Initialization is a separate manual step.
    readinessProbe:
      path: "/v1/sys/health?standbyok=true&sealedok=true&uninitcode=200"
      port: 8200

    ha:
      enabled: true
      replicas: 3

      raft:
        enabled: true
        setNodeId: true

        config: |
          ui = true

          listener "tcp" {
            address         = "[::]:8200"
            cluster_address = "[::]:8201"
            tls_cert_file   = "/openbao/tls/tls.crt"
            tls_key_file    = "/openbao/tls/tls.key"
          }

          storage "raft" {
            path = "/openbao/data"
          }

          service_registration "kubernetes" {}

  ui:
    enabled: true
    serviceType: ClusterIP

  injector:
    enabled: false
