apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "argocd.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/cluster-issuer: "sovereign-ca-issuer"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - {{ include "argocd.host" . }}
      secretName: argocd-server-tls
  rules:
    - host: {{ include "argocd.host" . }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80
