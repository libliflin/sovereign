# kind/sovereign-ha.yaml
# 3-node HA cluster: 1 control plane + 2 workers.
# Use this for HA validation, PDB testing, and chaos scenarios.
# Matches the production minimum (3 nodes, odd count).
#
# Memory: ~3.5–4.5GB Docker overhead. Requires Docker Desktop >= 8GB RAM.
# Increase Docker Desktop memory: Docker Desktop → Settings → Resources → Memory → 10GB+
#
# Usage: kind create cluster --config kind/sovereign-ha.yaml --name sovereign-ha

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

name: sovereign-ha

networking:
  disableDefaultCNI: true
  kubeProxyMode: "none"
  podSubnet: "10.244.0.0/16"
  serviceSubnet: "10.96.0.0/12"

nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30080
        hostPort: 8080
        protocol: TCP
        listenAddress: "127.0.0.1"
      - containerPort: 30443
        hostPort: 8443
        protocol: TCP
        listenAddress: "127.0.0.1"
    labels:
      sovereign.autarky/role: control-plane
      ingress-ready: "true"
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
      - |
        kind: KubeletConfiguration
        evictionHard:
          memory.available: "200Mi"
          nodefs.available: "5%"

  - role: worker
    labels:
      sovereign.autarky/role: worker
    kubeadmConfigPatches:
      - |
        kind: KubeletConfiguration
        evictionHard:
          memory.available: "200Mi"
          nodefs.available: "5%"

  - role: worker
    labels:
      sovereign.autarky/role: worker
    kubeadmConfigPatches:
      - |
        kind: KubeletConfiguration
        evictionHard:
          memory.available: "200Mi"
          nodefs.available: "5%"
