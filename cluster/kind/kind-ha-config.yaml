##############################################################################
# kind HA cluster configuration for sovereign-ha
#
# 3 control-plane nodes (etcd quorum) + 2 worker nodes.
# Follows cluster/CLAUDE.md HA requirements: 3+ nodes, odd count.
##############################################################################
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

networking:
  podSubnet: "10.244.0.0/16"
  serviceSubnet: "10.96.0.0/12"

nodes:
  - role: control-plane
  - role: control-plane
  - role: control-plane
  - role: worker
  - role: worker
