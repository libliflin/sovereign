global:
  domain: "sovereign-autarky.dev"
  imageRegistry: ""  # set to harbor.<domain>/sovereign after Harbor is running
  tls:
    clusterIssuer: "selfsigned"
  ingressClass: "nginx"

# Cilium chart values (passed to the cilium dependency)
cilium:
  # Use Kubernetes host networking for the agent
  kubeProxyReplacement: "true"

  # WireGuard encryption between nodes
  encryption:
    enabled: true
    type: wireguard

  # Hubble observability
  hubble:
    enabled: true
    relay:
      enabled: true
    ui:
      enabled: true
      ingress:
        enabled: true
        annotations:
          kubernetes.io/ingress.class: nginx
          cert-manager.io/cluster-issuer: selfsigned
        hosts:
          - hubble.sovereign-autarky.dev
        tls:
          - secretName: hubble-tls
            hosts:
              - hubble.sovereign-autarky.dev

  # IPAM configuration
  ipam:
    mode: kubernetes

  # Enable network policy enforcement
  policyEnforcementMode: "default"

  # Resource limits for the Cilium agent DaemonSet
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 4000m
      memory: 4Gi

  # Resource limits for initContainers
  initResources:
    requests:
      cpu: 100m
      memory: 10Mi
    limits:
      cpu: 200m
      memory: 64Mi

  # Operator settings
  operator:
    replicas: 2
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

# Default deny-all network policy settings
networkPolicies:
  # Whether to create the default deny-all policy
  defaultDenyAll: true
  # Namespaces to exempt from the default deny-all policy
  # (kube-system is always exempt)
  exemptNamespaces:
    - kube-system
    - cert-manager
