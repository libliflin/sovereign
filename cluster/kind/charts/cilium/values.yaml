global:
  domain: "sovereign-autarky.dev"
  imageRegistry: ""  # set to harbor.<domain>/sovereign after Harbor is running
  tls:
    clusterIssuer: "selfsigned"
  ingressClass: "nginx"

# Cilium chart values (passed to the cilium dependency)
cilium:
  # Use Kubernetes host networking for the agent
  kubeProxyReplacement: "true"

  # WireGuard encryption between nodes
  encryption:
    enabled: true
    type: wireguard

  # Hubble observability — relay, ui, and per-container resource limits
  hubble:
    enabled: true
    relay:
      enabled: true
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 256Mi
    ui:
      enabled: true
      ingress:
        enabled: true
        annotations:
          kubernetes.io/ingress.class: nginx
          cert-manager.io/cluster-issuer: selfsigned
        hosts:
          - hubble.sovereign-autarky.dev
        tls:
          - secretName: hubble-tls
            hosts:
              - hubble.sovereign-autarky.dev
      backend:
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 128Mi
      frontend:
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            cpu: 50m
            memory: 64Mi

  # IPAM configuration
  ipam:
    mode: kubernetes

  # Enable network policy enforcement
  policyEnforcementMode: "default"

  # Resource limits for the Cilium agent DaemonSet main container
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 4000m
      memory: 4Gi

  # Resource limits for initContainers that use .Values.initResources
  # (apply-sysctl-overwrites and similar bootstrap init containers)
  initResources:
    requests:
      cpu: 100m
      memory: 10Mi
    limits:
      cpu: 200m
      memory: 64Mi

  # mount-cgroup init container — uses cgroup.autoMount.resources (separate from initResources)
  cgroup:
    autoMount:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi

  # install-cni-binaries init container — uses cni.resources
  cni:
    resources:
      requests:
        cpu: 100m
        memory: 10Mi
      limits:
        cpu: 200m
        memory: 64Mi

  # cilium-envoy standalone DaemonSet container
  envoy:
    resources:
      requests:
        cpu: 100m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 512Mi

  # Operator settings
  operator:
    replicas: 2
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

# Default deny-all network policy settings
networkPolicies:
  # Whether to create the default deny-all policy
  defaultDenyAll: true
  # Namespaces to exempt from the default deny-all policy
  # (kube-system is always exempt)
  exemptNamespaces:
    - kube-system
    - cert-manager
