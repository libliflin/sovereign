# Sovereign Platform — GitLab CI Pipeline Template
# ──────────────────────────────────────────────────────────────────────────────
# Include this template in every mirrored vendor repo:
#
#   include:
#     - project: 'sovereign/ci-templates'
#       file: 'vendor/gitlab-ci-template.yml'
#
# The pipeline runs when a new tag is pushed to the internal GitLab mirror.
# It: fetches source at the pinned SHA → applies patches → builds via ko/docker
#     → pushes to Harbor sovereign-staging → runs smoke test → promotes to production.
#
# Required CI/CD variables (set at group level in gitlab.<domain>/vendor):
#   HARBOR_HOST         — harbor.<domain>
#   HARBOR_USER         — robot account with push access to sovereign/*
#   HARBOR_PASSWORD     — robot account token
#   SOVEREIGN_REPO      — https://github.com/libliflin/sovereign.git
#   SOVEREIGN_TOKEN     — GitLab token to push recipe.yaml updates
# ──────────────────────────────────────────────────────────────────────────────

variables:
  RECIPE_DIR: "vendor/recipes/${CI_PROJECT_NAME}"
  STAGING_REGISTRY: "${HARBOR_HOST}/sovereign-staging"
  PROD_REGISTRY: "${HARBOR_HOST}/sovereign"
  # IMAGE_NAME is set per-project; override in project-level .gitlab-ci.yml
  IMAGE_NAME: "${CI_PROJECT_NAME}"

stages:
  - validate
  - build
  - test
  - promote
  - release

# ── Stage: validate ────────────────────────────────────────────────────────────
validate:sha:
  stage: validate
  image: alpine/git:latest
  script:
    - |
      # Verify the tag SHA matches the pinned git_sha in recipe.yaml
      RECIPE="${SOVEREIGN_REPO_PATH}/vendor/recipes/${CI_PROJECT_NAME}/recipe.yaml"
      PINNED_SHA=$(grep 'git_sha:' "${RECIPE}" | awk '{print $2}' | tr -d '"')
      CURRENT_SHA=$(git rev-parse HEAD)
      if [ -n "${PINNED_SHA}" ] && [ "${CURRENT_SHA}" != "${PINNED_SHA}" ]; then
        echo "ERROR: HEAD SHA ${CURRENT_SHA} does not match pinned git_sha ${PINNED_SHA}"
        echo "Run: vendor/pin.sh ${CI_PROJECT_NAME} <version> to update the pin."
        exit 1
      fi
      echo "SHA verification passed: ${CURRENT_SHA}"
  rules:
    - if: '$CI_COMMIT_TAG'

# ── Stage: build ───────────────────────────────────────────────────────────────
build:image:
  stage: build
  image: golang:1.22
  variables:
    KO_DOCKER_REPO: "${STAGING_REGISTRY}/${IMAGE_NAME}"
    GOFLAGS: "-mod=mod"
  before_script:
    - go install github.com/google/ko@latest
    - docker login -u "${HARBOR_USER}" -p "${HARBOR_PASSWORD}" "${HARBOR_HOST}"
  script:
    - |
      # Determine patch count
      PATCH_DIR="vendor/recipes/${CI_PROJECT_NAME}/patches"
      PATCH_COUNT=0
      if [ -d "${PATCH_DIR}" ]; then
        PATCH_COUNT=$(find "${PATCH_DIR}" -name '*.patch' | wc -l | tr -d ' ')
      fi

      # Apply patches in alphabetical order
      if [ "${PATCH_COUNT}" -gt 0 ]; then
        for patch in $(ls "${PATCH_DIR}"/*.patch | sort); do
          echo "Applying patch: ${patch}"
          git apply "${patch}"
        done
      fi

      SOURCE_SHA=$(git rev-parse --short HEAD)
      VERSION="${CI_COMMIT_TAG}"
      IMAGE_TAG="${VERSION}-${SOURCE_SHA}-p${PATCH_COUNT}"

      echo "Building: ${KO_DOCKER_REPO}:${IMAGE_TAG}"

      # Build with ko — produces distroless image automatically
      ko build \
        --base-import-paths \
        --tags "${IMAGE_TAG}" \
        --platform linux/amd64,linux/arm64 \
        --bare \
        ./...

      # Add OCI labels
      # (ko supports LABEL env vars; inject via ko.yaml if present)
      echo "IMAGE_TAG=${IMAGE_TAG}" >> build.env
      echo "SOURCE_SHA=${SOURCE_SHA}" >> build.env
      echo "PATCH_COUNT=${PATCH_COUNT}" >> build.env
  artifacts:
    reports:
      dotenv: build.env
  rules:
    - if: '$CI_COMMIT_TAG'
      when: on_success

# ── Stage: test ────────────────────────────────────────────────────────────────
test:distroless:
  stage: test
  image: docker:24
  services:
    - docker:24-dind
  dependencies:
    - build:image
  script:
    - |
      docker login -u "${HARBOR_USER}" -p "${HARBOR_PASSWORD}" "${HARBOR_HOST}"
      FULL_IMAGE="${STAGING_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"

      echo "Pulling: ${FULL_IMAGE}"
      docker pull "${FULL_IMAGE}"

      # Start container in background
      CONTAINER=$(docker run -d --entrypoint "" "${FULL_IMAGE}" sleep 60 2>/dev/null || true)

      # Verify no shell is available (distroless validation)
      if [ -n "${CONTAINER}" ]; then
        if docker exec "${CONTAINER}" /bin/sh -c "echo shell-found" 2>/dev/null | grep -q "shell-found"; then
          echo "FAIL: Container has /bin/sh — not distroless"
          docker rm -f "${CONTAINER}"
          exit 1
        fi
        echo "PASS: No shell found — distroless confirmed"
        docker rm -f "${CONTAINER}"
      else
        echo "NOTE: Container exited immediately (expected for some distroless images)"
        echo "PASS: Distroless validation skipped for crash-only images"
      fi
  rules:
    - if: '$CI_COMMIT_TAG'
      when: on_success

# ── Stage: promote ────────────────────────────────────────────────────────────
promote:to-production:
  stage: promote
  image: gcr.io/go-containerregistry/crane:latest
  dependencies:
    - build:image
  script:
    - |
      crane auth login -u "${HARBOR_USER}" -p "${HARBOR_PASSWORD}" "${HARBOR_HOST}"

      SRC="${STAGING_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"
      DST="${PROD_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"

      echo "Promoting: ${SRC} → ${DST}"
      crane copy "${SRC}" "${DST}"
      echo "Promoted successfully: ${DST}"

      # Record last-known-good SHA
      echo "LKG_IMAGE=${DST}" >> promote.env
  artifacts:
    reports:
      dotenv: promote.env
  rules:
    - if: '$CI_COMMIT_TAG'
      when: on_success

# ── Stage: release ────────────────────────────────────────────────────────────
release:gitlab:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  dependencies:
    - promote:to-production
  script:
    - echo "Creating GitLab release for ${CI_COMMIT_TAG}"
  release:
    tag_name: "${CI_COMMIT_TAG}"
    name: "sovereign/${IMAGE_NAME} ${CI_COMMIT_TAG}"
    description: |
      Sovereign Platform vendor build: ${IMAGE_NAME} ${CI_COMMIT_TAG}

      Image: ${LKG_IMAGE}
      Source SHA: ${SOURCE_SHA}
      Patches applied: ${PATCH_COUNT}

      Built from internal GitLab mirror at pinned SHA.
      Promoted to Harbor sovereign registry after distroless validation.
  rules:
    - if: '$CI_COMMIT_TAG'
      when: on_success
