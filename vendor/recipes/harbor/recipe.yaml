name: harbor
upstream_url: https://github.com/goharbor/harbor
version: "v2.10.0"
license_spdx: Apache-2.0
fetch_method: git_tag
distroless_base: gcr.io/distroless/static
build_tool: ko
# Build notes: harbor core, jobservice, and registry-ctl are all static Go binaries.
# The Redis and PostgreSQL sidecars use upstream images (not sovereign-built).
rollout:
  strategy: rolling
  max_unavailable: 0
  max_surge: 1
  staging_timeout: 5m
  production_timeout: 10m
backup:
  priority: critical
