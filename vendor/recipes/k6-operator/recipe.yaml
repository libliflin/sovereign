name: k6-operator
upstream_url: https://github.com/grafana/k6-operator
version: "v0.0.15"
license_spdx: AGPL-3.0-only
fetch_method: git_tag
distroless_base: gcr.io/distroless/static
build_tool: skip
# DEPRECATED: k6-operator uses AGPL-3.0 which requires review before vendoring.
# Alternative: run k6 (MIT) directly as a Kubernetes Job without the operator.
# The k6 binary (https://github.com/grafana/k6, MIT) can be vendored separately.
rollout:
  strategy: rolling
  max_unavailable: 0
  max_surge: 1
  staging_timeout: 5m
  production_timeout: 10m
backup:
  priority: derived
