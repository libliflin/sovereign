name: loki
upstream_url: https://github.com/grafana/loki
version: "v3.0.0"
license_spdx: AGPL-3.0-only
fetch_method: git_tag
distroless_base: gcr.io/distroless/static
build_tool: skip
# DEPRECATED: Loki uses AGPL-3.0 which requires review before vendoring.
# Alternative: victorialogs (Apache-2.0) — https://github.com/VictoriaMetrics/VictoriaMetrics
rollout:
  strategy: rolling
  max_unavailable: 0
  max_surge: 1
  staging_timeout: 5m
  production_timeout: 10m
backup:
  priority: standard
