name: keycloak
upstream_url: https://github.com/keycloak/keycloak
version: "v24.0.4"
license_spdx: Apache-2.0
fetch_method: git_tag
distroless_base: gcr.io/distroless/java21
build_tool: docker
# Build notes: multi-stage Dockerfile
#   Stage 1 (builder): eclipse-temurin:21-jdk + Maven/Gradle to compile
#   Stage 2 (final):   gcr.io/distroless/java21 with compiled JAR
# Long-term alternative: Kanidm (Rust, Apache-2.0) — native distroless/static
rollout:
  strategy: rolling
  max_unavailable: 0
  max_surge: 1
  staging_timeout: 5m
  production_timeout: 10m
backup:
  priority: critical
